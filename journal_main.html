<body>
  <div id="root"></div> <!-- 이 안에 React 앱 전체가 렌더링됩니다 -->

  <!-- ===== 외부 라이브러리 로딩 ===== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> <!-- Supabase: 데이터베이스 + 로그인 시스템 -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script> <!-- SheetJS: 엑셀 파일 내보내기용 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script> <!-- React: 화면(UI) 구성 라이브러리 -->

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script> <!-- Babel: 최신 문법을 브라우저가 이해할 수 있게 변환 -->

  <!-- ===== 여기서부터 앱의 실제 코드가 시작됩니다 ===== -->
  <script type="text/babel">
    // React에서 자주 쓰는 기능들을 미리 가져옴
    const { useState, useRef, useEffect, createContext, useContext, useCallback } = React;

    // ===== Supabase 연결 설정 (데이터베이스 서버 주소와 접속 키) =====
    const SUPABASE_URL = 'https://vgtpjvwtpzvxxlizsvos.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZndHBqdnd0cHp2eHhsaXpzdm9zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0ODg1NjMsImV4cCI6MjA4NzA2NDU2M30.k1dm3cjQz0K8M4cc9vrxh11ET39u41SsxyWPWdTvOLs';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); // Supabase 클라이언트 생성 — 이걸로 DB 읽기/쓰기, 로그인 등을 처리

    // ========================================================
    // 📷 사진 signed URL 헬퍼 (private 버킷용)
    // ========================================================
    const photoUrlCache = {};
    async function getPhotoUrl(photoRef) {
      if (!photoRef) return null;
      // 이미 full URL(기존 데이터)이면 signed URL로 변환 시도
      const path = photoRef.startsWith('http')
        ? photoRef.split('/storage/v1/object/public/diary-photos/')[1] || null
        : photoRef;
      if (!path) return photoRef; // 파싱 불가 시 원본 반환
      if (photoUrlCache[path]) return photoUrlCache[path];
      const { data, error } = await sb.storage.from('diary-photos').createSignedUrl(path, 3600); // 1시간
      if (error) { console.error('Signed URL 오류:', error); return null; }
      photoUrlCache[path] = data.signedUrl;
      return data.signedUrl;
    }

    // ========================================================
    // ✨ Gemini AI 헬퍼 (Supabase Edge Function 경유 - API 키 서버에서 관리)
    // ========================================================
    async function callGemini(prompt) {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/functions/v1/gemini-proxy`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            },
            body: JSON.stringify({ prompt }),
          }
        );
        const data = await res.json();
        if (data.error) {
          console.error("Gemini API 오류:", data.error);
          return `API 오류: ${data.error}`;
        }
        return data.text || "분석을 가져올 수 없었어요.";
      } catch (e) {
        console.error("Gemini 호출 실패:", e);
        return "네트워크 오류로 분석을 가져올 수 없었어요.";
      }
    }

    // ========================================================
    // 🎨 테마 색상 설정 — 앱 전체에서 사용하는 색상 모음
    // 색상을 바꾸고 싶으면 여기서 값을 변경하면 앱 전체에 적용됩니다
    // ========================================================
    const T = {
      bg:"#F5F0E8",        // 배경색 (연한 베이지)
      card:"#FFFCF7",      // 카드 배경색 (거의 흰색)
      accent:"#B8956A",    // 포인트 색상 (갈색 계열 — 버튼, 강조 텍스트 등)
      accentLight:"#D4B896", // 포인트 연한 버전
      accentBg:"#F0E6D6",  // 포인트 배경색
      text:"#4A3728",      // 기본 글자 색
      textSub:"#8B7355",   // 보조 글자 색 (설명문 등)
      border:"#E8DFD0",    // 테두리 색
      hover:"#EDE5D8",     // 마우스 올렸을 때 색
      shadow:"0 2px 12px rgba(139,115,85,0.08)",       // 기본 그림자
      shadowHover:"0 6px 24px rgba(139,115,85,0.14)",   // 강조 그림자
      gradient:"linear-gradient(135deg,#B8956A,#9B7B5A)", // 그라데이션 (버튼에 사용)
      input:"#F0EBE1",     // 입력칸 배경색
      divider:"#E5DDD0",   // 구분선 색
      textMuted:"#A89F90",  // 흐린 글자 색
      danger:"#C97064",    // 경고/위험 색 (빨간 계열)
      success:"#8DB580",   // 성공 색 (초록 계열)
    };

    // ========================================================
    // 🎭 감정 목록 — 일기 작성 시 선택할 수 있는 감정들
    // "긍정"과 "부정" 두 그룹으로 나뉘고, 각 그룹 안에 세부 감정이 있음
    // key: 내부 식별용, emoji: 화면에 표시할 이모지, label: 한글 이름
    // ========================================================
    const EMOTION_CATEGORIES = [
      { label:"긍정", groups: [
        { group:"감동·감사", color:"#C4A265", emotions: [
          {key:"moved",emoji:"🥹",label:"감동받은"}, {key:"grateful",emoji:"🥰",label:"감사한"}, {key:"fulfilled",emoji:"😇",label:"충만한"}, {key:"ecstatic",emoji:"🤩",label:"황홀한"},
        ]},
        { group:"기쁨·즐거움", color:"#E8A87C", emotions: [
          {key:"happy",emoji:"😊",label:"행복한"}, {key:"joyful",emoji:"😄",label:"즐거운"}, {key:"excited",emoji:"🎉",label:"신나는"}, {key:"fun",emoji:"😆",label:"재미있는"},
        ]},
        { group:"따뜻함·친근함", color:"#D4897C", emotions: [
          {key:"warm",emoji:"🤗",label:"따뜻한"}, {key:"loving",emoji:"💕",label:"사랑하는"}, {key:"cozy",emoji:"☺️",label:"포근한"}, {key:"tender",emoji:"🥲",label:"애틋한"},
        ]},
        { group:"만족·편안함", color:"#8DB580", emotions: [
          {key:"proud",emoji:"💪",label:"뿌듯한"}, {key:"satisfied",emoji:"😌",label:"만족스런"}, {key:"relieved",emoji:"😮‍💨",label:"후련한"}, {key:"peaceful",emoji:"🍃",label:"편안한"}, {key:"calm",emoji:"🧘",label:"차분한"},
        ]},
        { group:"활기·자신감", color:"#C49555", emotions: [
          {key:"energetic",emoji:"⚡",label:"활기찬"}, {key:"confident",emoji:"😎",label:"자신감 있는"}, {key:"hopeful",emoji:"✨",label:"기대에 부푼"}, {key:"brave",emoji:"🦁",label:"용기 나는"},
        ]},
      ]},
      { label:"부정", groups: [
        { group:"두려움·불안", color:"#A688B0", emotions: [
          {key:"anxious",emoji:"😰",label:"불안한"}, {key:"worried",emoji:"😟",label:"걱정되는"}, {key:"scared",emoji:"😨",label:"두려운"}, {key:"nervous",emoji:"😬",label:"긴장한"},
        ]},
        { group:"불편·난처", color:"#B8956A", emotions: [
          {key:"uncomfortable",emoji:"😣",label:"불편한"}, {key:"frustrated",emoji:"😤",label:"답답한"}, {key:"confused",emoji:"😵‍💫",label:"혼란스러운"}, {key:"embarrassed",emoji:"😳",label:"창피한"},
        ]},
        { group:"슬픔·서운함", color:"#8BA4B8", emotions: [
          {key:"sad",emoji:"😢",label:"슬픈"}, {key:"missing",emoji:"🥺",label:"그리운"}, {key:"disappointed",emoji:"😞",label:"서운한"}, {key:"heartbroken",emoji:"💔",label:"안타까운"},
        ]},
        { group:"외로움·무력감", color:"#9678A0", emotions: [
          {key:"lonely",emoji:"🌙",label:"외로운"}, {key:"empty",emoji:"🕳️",label:"공허한"}, {key:"depressed",emoji:"🌧️",label:"우울한"}, {key:"helpless",emoji:"😶",label:"무력한"},
        ]},
        { group:"피로·화", color:"#C97064", emotions: [
          {key:"tired",emoji:"😴",label:"피곤한"}, {key:"bored",emoji:"🥱",label:"지겨운"}, {key:"angry",emoji:"😠",label:"화나는"}, {key:"upset",emoji:"🤯",label:"속상한"},
        ]},
      ]},
    ];

    // 감정 데이터를 하나의 객체로 정리 (다른 코드에서 쉽게 접근하기 위함)
    const EMOTIONS = {};
    EMOTION_CATEGORIES.forEach(cat => cat.groups.forEach(g => g.emotions.forEach(e => {
      EMOTIONS[e.key] = { emoji: e.emoji, label: e.label, color: g.color };
    })));
    const EMO_KEYS = Object.keys(EMOTIONS); // 모든 감정의 key 목록
    const ACTIVITIES = ["🏃 운동","📚 독서","🎵 음악","🍳 요리","🎮 게임","☕ 카페","🎬 영화","💻 코딩","🧘 명상","📸 사진","🛒 쇼핑","👥 모임","🚶 산책","🏠 집"]; // 활동 목록 (현재 미사용)
    const INTENSITY = ["매우 약함","약함","보통","강함","매우 강함"]; // 감정 강도 단계 (1~5)

    // ===== 날짜 관련 도구 함수들 =====
    const today = () => new Date().toISOString().slice(0,10); // 오늘 날짜를 "2026-03-13" 형식으로 반환
    const fmt = d => { // 날짜를 "3/13 (금)" 형식으로 변환
      const x = new Date(d+"T00:00:00");
      const w = ["일","월","화","수","목","금","토"];
      return `${x.getMonth()+1}/${x.getDate()} (${w[x.getDay()]})`;
    };
    const fmtFull = d => { // 날짜를 "2026년 3월 13일 금요일" 형식으로 변환
      const x = new Date(d+"T00:00:00");
      const w = ["일","월","화","수","목","금","토"];
      return `${x.getFullYear()}년 ${x.getMonth()+1}월 ${x.getDate()}일 ${w[x.getDay()]}요일`;
    };
    const isToday = d => d === today(); // 해당 날짜가 오늘인지 확인

    // ===== 인증(로그인) 상태 관리 =====
    // AuthCtx: 앱 전체에서 로그인한 사용자 정보를 공유하기 위한 "공유 창고"
    const AuthCtx = createContext(null);
    const useAuth = () => useContext(AuthCtx); // 어디서든 useAuth()로 로그인 정보 접근 가능

    // ========================================================
    // 🔐 AuthProvider — 로그인/회원가입/로그아웃 기능을 관리하는 컴포넌트
    // 앱 전체를 감싸서 어디서든 로그인 상태를 확인할 수 있게 해줌
    // ========================================================
    function AuthProvider({children}) {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      useEffect(() => {
        sb.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user ?? null); setLoading(false);
        });
        const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
          setUser(session?.user ?? null); setLoading(false);
        });
        return () => subscription.unsubscribe();
      }, []);
      const login = async (provider, email, pw) => {
        setLoading(true); let errMsg = null;
        if (provider === 'email') {
          const { error } = await sb.auth.signInWithPassword({ email, password: pw });
          if (error) errMsg = error.message === 'Invalid login credentials' ? '이메일 또는 비밀번호가 올바르지 않습니다.' : error.message;
        } else {
          const redirectTo = window.location.origin + window.location.pathname;
          const { error } = await sb.auth.signInWithOAuth({ provider, options: { redirectTo } });
          if (error) errMsg = error.message;
        }
        setLoading(false); return errMsg;
      };
      const signup = async (email, pw, name) => {
        const { error } = await sb.auth.signUp({ email, password: pw, options: { data: { name } } });
        if (error) return error.message === 'User already registered' ? '이미 가입된 이메일입니다.' : error.message;
        return null;
      };
      const logout = async () => { await sb.auth.signOut(); };
      const displayName = user?.user_metadata?.name || user?.email?.split('@')[0] || '사용자';
      const displayEmail = user?.email || '';
      return (
        <AuthCtx.Provider value={{ user: user ? { ...user, name: displayName, email: displayEmail } : null, loading, login, signup, logout }}>
          {children}
        </AuthCtx.Provider>
      );

    // ⏳ LoadingScreen — 로딩 화면 (앱이 데이터를 불러올 때 표시)
    // "GYEOL" 로고가 두근두근 애니메이션으로 표시됨
    // ========================================================
    function LoadingScreen({text="나의 결을 불러오는 중..."}) {
      return (
        <div style={{position:"fixed",inset:0,background:T.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:52,marginBottom:16,animation:"pulse 1.5s infinite",letterSpacing:6,fontWeight:800,color:T.accent}}>GYEOL</div>
            <div style={{fontSize:13,color:T.textMuted||T.textSub,marginTop:4}}>{text}</div>
          </div>
        </div>
      );
    }

    // ========================================================
    // 🔑 LoginPage — 로그인/회원가입/비밀번호 찾기 화면
    // - Google 소셜 로그인 지원
    // - 이메일/비밀번호 로그인
    // - 회원가입 시 이용약관 + 개인정보처리방침 동의 필수
    // - 비밀번호 찾기 (이메일로 재설정 링크 발송)
    // ========================================================
    function LoginPage() {
      const {login, signup, loading} = useAuth();
      const [mode, setMode] = useState("login");
      const [email, setEmail] = useState(""); const [pw, setPw] = useState("");
      const [name, setName] = useState(""); const [pwConfirm, setPwConfirm] = useState("");
      const [error, setError] = useState(""); const [agreeTerms, setAgreeTerms] = useState(false);
      const [agreePrivacy, setAgreePrivacy] = useState(false); const [submitting, setSubmitting] = useState(false);
      const [signupDone, setSignupDone] = useState(false);
      const [showLegal, setShowLegal] = useState(null); // "terms" | "privacy" | null
      if (loading) return <LoadingScreen text="나의 결을 발견하는 중..."/>;
      const inp = { width:"100%", padding:"14px 16px", borderRadius:12, border:`1.5px solid ${T.border}`, background:T.card, fontSize:16, color:T.text, outline:"none", boxSizing:"border-box", WebkitAppearance:"none" };
      const handleLogin = async () => { setError(""); if (!email.trim()) return setError("이메일을 입력해주세요."); if (pw.length < 6) return setError("비밀번호는 6자 이상이어야 합니다."); setSubmitting(true); const err = await login("email", email, pw); setSubmitting(false); if (err) setError(err); };
      const handleSocial = async (provider) => { setError(""); setSubmitting(true); const err = await login(provider); setSubmitting(false); if (err) setError(err); };
      const handleSignup = async () => { setError(""); if (!name.trim()) return setError("이름을 입력해주세요."); if (!email.includes("@")) return setError("올바른 이메일 형식이 아닙니다."); if (pw.length < 6) return setError("비밀번호는 6자 이상이어야 합니다."); if (pw !== pwConfirm) return setError("비밀번호가 일치하지 않습니다."); if (!agreeTerms || !agreePrivacy) return setError("필수 약관에 동의해주세요."); setSubmitting(true); const err = await signup(email, pw, name); setSubmitting(false); if (err) setError(err); else setSignupDone(true); };
      const handleForgot = async () => { if (!email.includes("@")) return setError("올바른 이메일을 입력해주세요."); setSubmitting(true); const { error } = await sb.auth.resetPasswordForEmail(email); setSubmitting(false); if (error) setError(error.message); else { alert("비밀번호 재설정 이메일을 발송했습니다."); setMode("login"); } };
      const Btn = ({onClick, style, children, disabled}) => (
        <button onClick={onClick} disabled={disabled||submitting} style={{...style, opacity:submitting?0.7:1, cursor:submitting?"not-allowed":"pointer"}}>{submitting ? "처리 중..." : children}</button>
      );
      return (
        <div style={{ minHeight:"100dvh", background:`linear-gradient(180deg,${T.bg} 0%,#EDE5D8 100%)`, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px", paddingTop:`calc(env(safe-area-inset-top,0px) + 20px)`, paddingBottom:`calc(env(safe-area-inset-bottom,0px) + 20px)`, overflowY:"auto" }}>
          {showLegal && <LegalModal type={showLegal} onClose={()=>setShowLegal(null)}/>}
          <div style={{ width:"100%", maxWidth:420, background:T.card, borderRadius:24, padding:"40px 28px", boxShadow:"0 8px 40px rgba(139,115,85,0.12)" }}>
            <div style={{textAlign:"center", marginBottom:32}}>
              <div style={{fontSize:32, fontWeight:800, color:T.accent, letterSpacing:6, marginBottom:8}}>GYEOL</div>
              <div style={{fontSize:14, color:T.textSub, marginTop:4, lineHeight:1.6}}>당신은 어떤 결을 가진 사람인가요?</div>
            </div>
            {signupDone && (<div style={{padding:"20px", textAlign:"center"}}><div style={{fontSize:40, marginBottom:12}}>✉️</div><div style={{fontSize:16, fontWeight:700, color:T.text, marginBottom:8}}>이메일을 확인해주세요</div><div style={{fontSize:14, color:T.textSub, lineHeight:1.7, marginBottom:20}}>가입하신 이메일로 인증 링크를 보냈어요.<br/>링크를 클릭하면 로그인됩니다.</div><button onClick={()=>{setSignupDone(false);setMode("login");}} style={{background:"none", border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 24px", color:T.textSub, fontSize:14, cursor:"pointer"}}>로그인으로</button></div>)}
            {!signupDone && mode==="login" && (<>
              <div style={{display:"flex", flexDirection:"column", gap:10, marginBottom:20}}>
                <button onClick={()=>handleSocial('google')} style={{padding:"14px 16px", borderRadius:12, border:`1.5px solid ${T.border}`, background:T.card, color:T.text, fontSize:15, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8, minHeight:50}}><span style={{fontSize:16, fontWeight:900}}>G</span> Google로 시작하기</button>
              </div>
              <div style={{display:"flex", alignItems:"center", gap:10, margin:"16px 0"}}><div style={{flex:1, height:1, background:T.border}}/><span style={{fontSize:12, color:T.textSub, whiteSpace:"nowrap"}}>또는 이메일</span><div style={{flex:1, height:1, background:T.border}}/></div>
              <div style={{display:"flex", flexDirection:"column", gap:10}}>
                <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="이메일" type="email" style={inp} autoCapitalize="none" autoCorrect="off"/>
                <input value={pw} onChange={e=>setPw(e.target.value)} placeholder="비밀번호" type="password" style={inp} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
              </div>
              {error && <div style={{marginTop:10, padding:"10px 14px", borderRadius:10, background:"#FFF0EE", color:T.danger, fontSize:13, fontWeight:500}}>{error}</div>}
              <Btn onClick={handleLogin} style={{width:"100%", padding:16, borderRadius:12, border:"none", background:T.gradient, color:"#fff", fontSize:16, fontWeight:700, marginTop:16, minHeight:52}}>나의 결 찾기 →</Btn>
              <div style={{display:"flex", justifyContent:"space-between", marginTop:14}}>
                <button onClick={()=>{setMode("forgot");setError("");}} style={{background:"none", border:"none", color:T.textSub, fontSize:13, cursor:"pointer", padding:"8px 0", minHeight:40}}>비밀번호 찾기</button>
                <button onClick={()=>{setMode("signup");setError("");}} style={{background:"none", border:"none", color:T.accent, fontSize:13, fontWeight:700, cursor:"pointer", padding:"8px 0", minHeight:40}}>회원가입 →</button>
              </div>
            </>)}
            {!signupDone && mode==="signup" && (<>
              <div style={{fontSize:18, fontWeight:700, color:T.text, marginBottom:16}}>회원가입</div>
              <div style={{display:"flex", flexDirection:"column", gap:10}}>
                <input value={name} onChange={e=>setName(e.target.value)} placeholder="이름" style={inp}/>
                <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="이메일" type="email" style={inp} autoCapitalize="none"/>
                <input value={pw} onChange={e=>setPw(e.target.value)} placeholder="비밀번호 (6자 이상)" type="password" style={inp}/>
                <input value={pwConfirm} onChange={e=>setPwConfirm(e.target.value)} placeholder="비밀번호 확인" type="password" style={inp}/>
              </div>
              <div style={{marginTop:14, display:"flex", flexDirection:"column", gap:10}}>
                <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", padding:"4px 0"}}>
                  <label style={{display:"flex", alignItems:"center", gap:10, fontSize:14, color:T.text, cursor:"pointer"}}><input type="checkbox" checked={agreeTerms} onChange={e=>setAgreeTerms(e.target.checked)} style={{width:18,height:18,accentColor:T.accent}}/><span style={{color:T.danger, fontWeight:700}}>[필수]</span> 이용약관 동의</label>
                  <button onClick={()=>setShowLegal("terms")} style={{background:"none", border:"none", color:T.accent, fontSize:13, fontWeight:600, cursor:"pointer", padding:"4px 8px", textDecoration:"underline"}}>보기</button>
                </div>
                <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", padding:"4px 0"}}>
                  <label style={{display:"flex", alignItems:"center", gap:10, fontSize:14, color:T.text, cursor:"pointer"}}><input type="checkbox" checked={agreePrivacy} onChange={e=>setAgreePrivacy(e.target.checked)} style={{width:18,height:18,accentColor:T.accent}}/><span style={{color:T.danger, fontWeight:700}}>[필수]</span> 개인정보처리방침 동의</label>
                  <button onClick={()=>setShowLegal("privacy")} style={{background:"none", border:"none", color:T.accent, fontSize:13, fontWeight:600, cursor:"pointer", padding:"4px 8px", textDecoration:"underline"}}>보기</button>
                </div>
              </div>
              {error && <div style={{marginTop:10, padding:"10px 14px", borderRadius:10, background:"#FFF0EE", color:T.danger, fontSize:13}}>{error}</div>}
              <Btn onClick={handleSignup} style={{width:"100%", padding:16, borderRadius:12, border:"none", background:T.gradient, color:"#fff", fontSize:16, fontWeight:700, marginTop:16, minHeight:52}}>가입하기</Btn>
              <button onClick={()=>{setMode("login");setError("");}} style={{width:"100%", padding:12, background:"none", border:"none", color:T.textSub, fontSize:14, cursor:"pointer", marginTop:6, minHeight:44}}>← 로그인으로</button>
            </>)}
            {mode==="forgot" && (<>
              <div style={{fontSize:18, fontWeight:700, color:T.text, marginBottom:8}}>비밀번호 찾기</div>
              <div style={{fontSize:13, color:T.textSub, marginBottom:16, lineHeight:1.6}}>가입한 이메일을 입력하시면<br/>재설정 링크를 보내드려요.</div>
              <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="이메일" type="email" style={inp} autoCapitalize="none"/>
              {error && <div style={{marginTop:10, padding:"10px 14px", borderRadius:10, background:"#FFF0EE", color:T.danger, fontSize:13}}>{error}</div>}
              <Btn onClick={handleForgot} style={{width:"100%", padding:16, borderRadius:12, border:"none", background:T.gradient, color:"#fff", fontSize:16, fontWeight:700, marginTop:14, minHeight:52}}>재설정 링크 보내기</Btn>
              <button onClick={()=>{setMode("login");setError("");}} style={{width:"100%", padding:12, background:"none", border:"none", color:T.textSub, fontSize:14, cursor:"pointer", marginTop:6, minHeight:44}}>← 로그인으로</button>
            </>)}
          </div>
        </div>
      );
    }

    // ========================================================
    // 🎭 EmotionSelector — 감정 선택 화면
    // 일기 작성 시 "긍정/부정" 탭 전환 → 세부 감정 칩 선택 → 강도(1~5) 설정
    // 하나의 감정만 선택 가능 (다시 누르면 해제)
    // ========================================================
    function EmotionSelector({selEmotions, setSelEmotions}) {
      const [activeTab, setActiveTab] = useState(0);
      const selectEmo = k => {
        const ex = selEmotions.find(e=>e.key===k);
        if (ex) setSelEmotions([]);
        else setSelEmotions([{key:k, intensity:3}]);
      };
      const setIntensity = (k,v) => setSelEmotions(selEmotions.map(e=>e.key===k?{...e,intensity:v}:e));
      const currentGroups = EMOTION_CATEGORIES[activeTab].groups;
      const selected = selEmotions[0] || null;
      return (
        <div style={{background:T.card, borderRadius:16, padding:"18px 20px", marginBottom:14, boxShadow:T.shadow}}>
          <div style={{fontSize:15, fontWeight:700, color:T.text, marginBottom:4}}>오늘 어떤 감정을 느꼈나요?</div>
          <div style={{fontSize:12, color:T.textSub, marginBottom:14}}>하나의 감정을 선택해주세요</div>

          {/* 긍정/부정 세그먼트 탭 */}
          <div style={{display:"flex", borderRadius:12, background:T.bg, padding:3, marginBottom:16, border:`1px solid ${T.border}`}}>
            {EMOTION_CATEGORIES.map((cat,i)=>(
              <button key={i} onClick={()=>setActiveTab(i)} style={{flex:1, padding:"10px 0", borderRadius:10, border:"none", fontSize:14, fontWeight:activeTab===i?700:500, cursor:"pointer", background:activeTab===i?T.card:"transparent", color:activeTab===i?T.text:T.textSub, boxShadow:activeTab===i?"0 1px 4px rgba(0,0,0,0.08)":"none", transition:"all 0.2s"}}>
                {i===0?"😊":"😢"} {cat.label}
              </button>
            ))}
          </div>

          {/* 그룹별 감정 칩 */}
          <div style={{display:"flex", flexDirection:"column", gap:14}}>
            {currentGroups.map((g,gi)=>(
              <div key={gi}>
                <div style={{fontSize:11, fontWeight:700, color:g.color, marginBottom:8, paddingLeft:2, display:"flex", alignItems:"center", gap:6}}>
                  <span style={{width:6, height:6, borderRadius:"50%", background:g.color, display:"inline-block"}}/>
                  {g.group}
                </div>
                <div style={{display:"flex", flexWrap:"wrap", gap:8}}>
                  {g.emotions.map(emo=>{
                    const sel = selected && selected.key===emo.key;
                    return (
                      <button key={emo.key} onClick={()=>selectEmo(emo.key)}
                        style={{padding:"7px 14px", borderRadius:20, border:`1.5px solid ${sel?g.color:T.border}`, background:sel?g.color+"22":"#fff", fontSize:13, cursor:"pointer", color:sel?T.text:T.textSub, fontWeight:sel?600:400, transition:"all 0.15s", transform:sel?"scale(1.05)":"scale(1)"}}>
                        {emo.emoji} {emo.label}
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>

          {/* 선택된 감정 + 강도 선택 */}
          {selected && EMOTIONS[selected.key] && (
            <div style={{marginTop:16, padding:"14px 16px", background:T.accentBg, borderRadius:14, animation:"fadeIn 0.2s ease"}}>
              <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:12}}>
                <span style={{fontSize:22}}>{EMOTIONS[selected.key].emoji}</span>
                <span style={{fontSize:15, fontWeight:700, color:T.text}}>{EMOTIONS[selected.key].label}</span>
                <button onClick={()=>setSelEmotions([])} style={{marginLeft:"auto", background:"none", border:"none", fontSize:12, color:T.textSub, cursor:"pointer", padding:4}}>✕ 해제</button>
              </div>
              <div style={{fontSize:12, fontWeight:600, color:T.textSub, marginBottom:8}}>감정의 강도</div>
              <div style={{display:"flex", gap:6, alignItems:"center"}}>
                {INTENSITY.map((label,i)=>(
                  <button key={i} onClick={()=>setIntensity(selected.key,i+1)} title={label}
                    style={{flex:1, padding:"10px 4px", borderRadius:10, border:`1.5px solid ${selected.intensity===i+1?EMOTIONS[selected.key].color:T.border}`, background:selected.intensity===i+1?EMOTIONS[selected.key].color+"33":"#fff", fontSize:11, color:selected.intensity===i+1?T.text:T.textSub, cursor:"pointer", fontWeight:selected.intensity===i+1?700:400, textAlign:"center", transition:"all 0.15s"}}>
                    {label}
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ========================================================
    // ✏️ DiaryWritePage — 일기 작성/수정 전체 화면
    // 1단계: 감정 선택 → 2단계: 제목+본문+사진 작성 → 저장
    // - 자동 임시 저장 기능 (브라우저 localStorage에 저장)
    // - 사진 업로드 (최대 2MB, Supabase 스토리지에 저장)
    // - 수정 시 기존 데이터를 불러와서 편집
    // ========================================================
    function DiaryWritePage({onSave, onCancel, editData}) {
      const {user} = useAuth();
      const DRAFT_KEY = `gyeol_draft_${today()}`;
      const _draft = (() => { try { const s = localStorage.getItem(DRAFT_KEY); return s ? JSON.parse(s) : null; } catch(e) { return null; } })();
      const _init = _draft || editData;
      const [title, setTitle] = useState(_init?.title||"");
      const [content, setContent] = useState(_init?.content||"");
      const [selEmotions, setSelEmotions] = useState(_init?.emotions||[]);
      const [saving, setSaving] = useState(false);
      const [photoFile, setPhotoFile] = useState(null);
      const [photoPreview, setPhotoPreview] = useState(null);
      const writingSectionRef = useRef(null);
      const scrollContainerRef = useRef(null);

      useEffect(() => {
        const photoPath = editData?.photo_url || _draft?.photo_url;
        if (photoPath) getPhotoUrl(photoPath).then(setPhotoPreview);
      }, []);

      // 자동 임시 저장
      useEffect(() => {
        const hasAny = title || content || selEmotions.length > 0;
        if (hasAny) {
          localStorage.setItem(DRAFT_KEY, JSON.stringify({ title, content, emotions: selEmotions, photo_url: photoPreview }));
        }
      }, [title, content, selEmotions, photoPreview]);

      // 첫 감정 선택 시 자동 스크롤
      const prevEmoCount = useRef(selEmotions.length);
      useEffect(() => {
        if (prevEmoCount.current === 0 && selEmotions.length === 1 && writingSectionRef.current) {
          setTimeout(() => writingSectionRef.current.scrollIntoView({ behavior:'smooth', block:'start' }), 150);
        }
        prevEmoCount.current = selEmotions.length;
      }, [selEmotions.length]);

      const handleSave = async () => {
        if (!title.trim()||!content.trim()||selEmotions.length===0) {
          alert("제목, 내용, 감정을 모두 입력해주세요."); return;
        }
        setSaving(true);
        let photo_url = !photoPreview ? null : (editData?.photo_url || null);
        if (photoFile) {
          try {
            const ext = photoFile.name.split('.').pop();
            const path = `diary_photos/${user.id}/${today()}_${Date.now()}.${ext}`;
            const { data: upData, error: upErr } = await sb.storage.from('diary-photos').upload(path, photoFile, { upsert: true });
            if (upErr) { console.error("사진 업로드 오류:", upErr); }
            else { photo_url = path; }
          } catch(e) { console.error("사진 업로드 실패:", e); }
        }
        await onSave({ title, content, emotions:selEmotions, activities:[], places:[], people:[], purchases:[], photo_url: photo_url || null, date:today() });
        localStorage.removeItem(DRAFT_KEY);
        setSaving(false);
      };

      const sec = {background:T.card, borderRadius:16, padding:"18px 20px", marginBottom:14, boxShadow:T.shadow};
      const inp = { width:"100%", padding:"12px 14px", borderRadius:12, border:`1px solid ${T.border}`, background:T.bg, fontSize:16, color:T.text, outline:"none", boxSizing:"border-box", WebkitAppearance:"none" };
      const hasEmotions = selEmotions.length > 0;

      return (
          <div style={{position:"fixed", inset:0, background:T.bg, zIndex:100, display:"flex", flexDirection:"column"}}>
            {/* 헤더 */}
            <div style={{ background:T.card, borderBottom:`1px solid ${T.border}`, padding:"0 20px", paddingTop:`calc(env(safe-area-inset-top,0px) + 12px)`, paddingBottom:12, display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0 }}>
              <button onClick={onCancel} style={{background:"none", border:"none", color:T.textSub, fontSize:15, cursor:"pointer", padding:"8px 0", minWidth:60, minHeight:44, textAlign:"left"}}>← 취소</button>
              <div style={{fontSize:16, fontWeight:700, color:T.text}}>{editData?"일기 수정":"오늘의 하루"}</div>
              <button onClick={handleSave} disabled={saving||!hasEmotions} style={{background:T.accent, color:"#fff", border:"none", borderRadius:10, padding:"9px 18px", fontSize:14, fontWeight:700, cursor:"pointer", minHeight:44, opacity:(saving||!hasEmotions)?0.5:1}}>
                {saving?"저장 중...":"저장"}
              </button>
            </div>

            {/* 스크롤 본문 */}
            <div ref={scrollContainerRef} style={{flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch", padding:"20px 16px", paddingBottom:`calc(env(safe-area-inset-bottom,0px) + 20px)`}}>
              <div style={{fontSize:13, color:T.textSub, textAlign:"center", marginBottom:16}}>{fmtFull(today())}</div>

              {/* 1단계: 감정 선택 (항상 표시) */}
              <EmotionSelector selEmotions={selEmotions} setSelEmotions={setSelEmotions}/>

              {/* 감정 미선택 시 안내 */}
              {!hasEmotions && (
                <div style={{textAlign:"center", padding:"32px 20px", color:T.textSub, fontSize:13, animation:"fadeIn 0.3s ease"}}>
                  ✍️ 감정을 선택하면 일기 작성 영역이 나타나요
                </div>
              )}

              {/* 2단계: 일기 작성 (감정 선택 후 노출) */}
              {hasEmotions && (
                <div ref={writingSectionRef} style={{animation:"slideUp 0.4s ease"}}>
                  {/* 제목 */}
                  <div style={sec}>
                    <div style={{fontSize:13, fontWeight:700, color:T.text, marginBottom:8}}>오늘의 제목</div>
                    <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="오늘 하루를 한 문장으로 표현한다면?" style={inp}/>
                  </div>

                  {/* 본문 */}
                  <div style={sec}>
                    <div style={{fontSize:13, fontWeight:700, color:T.text, marginBottom:8}}>오늘의 이야기</div>
                    <textarea value={content} onChange={e=>setContent(e.target.value)} placeholder="오늘 있었던 일을 솔직하게 적어보세요." rows={5}
                      style={{...inp, resize:"none", lineHeight:1.7, fontFamily:"'Noto Sans KR',sans-serif"}}/>
                  </div>

                  {/* 오늘의 사진 */}
                  <div style={sec}>
                    <div style={{fontSize:13, fontWeight:700, color:T.text, marginBottom:10}}>📷 오늘의 사진</div>
                    {photoPreview ? (
                      <div style={{position:"relative"}}>
                        <img src={photoPreview} alt="오늘의 사진" style={{width:"100%", borderRadius:12, maxHeight:300, objectFit:"cover"}}/>
                        <button onClick={()=>{setPhotoFile(null); setPhotoPreview(null);}}
                          style={{position:"absolute", top:8, right:8, width:32, height:32, borderRadius:"50%", background:"rgba(0,0,0,0.5)", color:"#fff", border:"none", fontSize:16, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center"}}>×</button>
                      </div>
                    ) : (
                      <label style={{display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"28px 16px", border:`2px dashed ${T.border}`, borderRadius:14, cursor:"pointer", background:T.bg, transition:"all 0.2s"}}>
                        <span style={{fontSize:32, marginBottom:8}}>📷</span>
                        <span style={{fontSize:13, color:T.textSub, fontWeight:500}}>사진을 선택해주세요</span>
                        <span style={{fontSize:11, color:T.textMuted, marginTop:4}}>최대 2MB · JPG, PNG, WEBP</span>
                        <input type="file" accept="image/jpeg,image/png,image/webp" style={{display:"none"}}
                          onChange={e=>{
                            const file = e.target.files?.[0];
                            if (!file) return;
                            if (file.size > 2*1024*1024) { alert("사진 크기가 2MB를 초과합니다. 더 작은 사진을 선택해주세요."); return; }
                            setPhotoFile(file);
                            const reader = new FileReader();
                            reader.onload = ev => setPhotoPreview(ev.target.result);
                            reader.readAsDataURL(file);
                          }}/>
                      </label>
                    )}
                  </div>
                </div>
              )}
            </div>
          </div>
      );
    }

    // ========================================================
    // 📅 MonthNavigator — 월 이동 + 뷰모드 전환 버튼
    // ◀ 2026년 3월 ▶ 형태로 이전/다음 달 이동
    // "월간" / "일간" 보기 모드 전환 탭
    // ========================================================
    function MonthNavigator({viewMonth, setViewMonth, calView, setCalView}) {
      const [y, m] = viewMonth.split("-").map(Number);
      const prev = () => { const d=new Date(y,m-2,1); setViewMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`); };
      const next = () => {
        const now = new Date(); const cur = new Date(y,m,1);
        if (cur > now) return;
        const d=new Date(y,m,1); setViewMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);
      };
      const isNextDisabled = () => { const now=new Date(); return y===now.getFullYear() && m===now.getMonth()+1; };
      return (
        <div style={{marginBottom:14}}>
          <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12}}>
            <button onClick={prev} style={{background:"none", border:"none", fontSize:18, cursor:"pointer", color:T.text, padding:"4px 8px"}}>◀</button>
            <span style={{fontSize:16, fontWeight:700, color:T.text}}>{y}년 {m}월</span>
            <button onClick={next} disabled={isNextDisabled()} style={{background:"none", border:"none", fontSize:18, cursor:"pointer", color:isNextDisabled()?T.border:T.text, padding:"4px 8px"}}>▶</button>
          </div>
          <div style={{display:"flex", borderRadius:12, background:T.bg, padding:3, border:`1px solid ${T.border}`}}>
            {["월","일"].map(v=>(
              <button key={v} onClick={()=>setCalView(v)} style={{flex:1, padding:"9px 0", borderRadius:10, border:"none", fontSize:13, fontWeight:calView===v?700:500, cursor:"pointer", background:calView===v?T.card:"transparent", color:calView===v?T.text:T.textSub, boxShadow:calView===v?"0 1px 4px rgba(0,0,0,0.08)":"none", transition:"all 0.2s"}}>
                {v==="월"?"📆 월간":"📋 일간"}
              </button>
            ))}
          </div>
        </div>
      );
    }

    // ========================================================
    // 📋 DailyCalendarView — "일간" 보기 모드
    // 세로 타임라인 형태로 날짜별 일기 카드를 표시
    // 각 카드에서 일기 상세보기, AI 분석 보기 가능
    // 점선으로 연결된 타임라인 디자인
    // ========================================================
    function DailyCalendarView({diaries, viewMonth, onSelect, onAI}) {
      const [y, m] = viewMonth.split("-").map(Number);
      const todayStr = today();
      const todayDate = new Date(todayStr+"T00:00:00");
      const daysInMonth = new Date(y, m, 0).getDate();
      const isCurrentMonth = y===todayDate.getFullYear() && m===todayDate.getMonth()+1;
      const lastDay = isCurrentMonth ? todayDate.getDate() : daysInMonth;
      const diaryMap = {};
      diaries.forEach(d => { if(d.date.startsWith(viewMonth)) diaryMap[parseInt(d.date.split("-")[2])]=d; });
      const weekdays = ["일","월","화","수","목","금","토"];
      const days = [];
      for (let i=lastDay; i>=1; i--) days.push(i);

      return (
        <div style={{position:"relative", paddingLeft:70}}>
          {/* 점선 타임라인 */}
          <div style={{position:"absolute", left:48, top:0, bottom:0, width:0, borderLeft:"2px dashed "+T.border}}/>
          {days.map(day=>{
            const dateStr = `${viewMonth}-${String(day).padStart(2,"0")}`;
            const d = diaryMap[day];
            const dow = new Date(y,m-1,day).getDay();
            const isTod = dateStr===todayStr;
            const emo = d && d.emotions && d.emotions[0] && EMOTIONS[d.emotions[0].key];
            return (
              <div key={day} style={{display:"flex", marginBottom:16, minHeight:60, position:"relative"}}>
                {/* 왼쪽 날짜 */}
                <div style={{position:"absolute", left:-70, width:56, textAlign:"center", flexShrink:0}}>
                  <div style={{fontSize:24, fontWeight:700, color:isTod?T.accent:T.text, lineHeight:1.1}}>{String(day).padStart(2,"0")}</div>
                  <div style={{fontSize:11, color:isTod?T.accent:T.textSub, fontWeight:500}}>{weekdays[dow]}요일</div>
                  {d && <div style={{fontSize:10, color:T.textSub, marginTop:2}}>{d.created_at?new Date(d.created_at).toLocaleTimeString("ko",{hour:"2-digit",minute:"2-digit"}):""}</div>}
                </div>
                {/* 점선 위 동그라미 */}
                <div style={{position:"absolute", left:-26, top:8, width:10, height:10, borderRadius:"50%", background:d?T.accent:T.border, border:`2px solid ${T.card}`, zIndex:1}}/>
                {/* 오른쪽 일기 카드 */}
                <div style={{flex:1, marginLeft:8}}>
                  {d ? (
                    <div style={{background:T.card, borderRadius:14, padding:"14px 16px", boxShadow:T.shadow, border:`1px solid ${T.border}`}}>
                      <div onClick={()=>onSelect(d)} style={{cursor:"pointer"}}>
                        {d.is_public===false && <span style={{display:"inline-block", background:T.accent, color:"#fff", fontSize:10, fontWeight:700, borderRadius:6, padding:"2px 8px", marginBottom:6}}>비공개</span>}
                        <div style={{fontSize:15, fontWeight:700, color:T.text, marginBottom:6, lineHeight:1.4}}>{d.title}</div>
                        {emo && <div style={{display:"flex", alignItems:"center", gap:4, marginBottom:8}}><span style={{fontSize:16}}>{emo.emoji}</span><span style={{fontSize:12, color:T.textSub}}>{emo.label}</span></div>}
                        <div style={{display:"flex", alignItems:"center", gap:12, fontSize:12, color:T.textSub}}>
                          {d.photo_url && <span>📷</span>}
                        </div>
                      </div>
                      <div style={{marginTop:10, paddingTop:10, borderTop:`1px solid ${T.border}`}}>
                        <button onClick={e=>{e.stopPropagation(); onAI(d);}}
                          style={{width:"100%", padding:"8px 0", border:`1px solid ${T.accentLight||T.accent+"44"}`, borderRadius:10, background:T.accentBg||T.accent+"11", color:T.accent, fontSize:13, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:5, minHeight:36}}>
                          {d.ai_analysis ? "✨ AI 분석 보기 · 저장됨" : "✨ AI 분석 보기"}
                        </button>
                      </div>
                    </div>
                  ) : (
                    <div style={{padding:"16px 0", color:T.textSub, fontSize:13}}>작성된 일기가 없습니다.</div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ========================================================
    // 📆 MonthlyCalendarView — "월간" 보기 모드
    // 일반 달력(7열 그리드) 형태로 한 달을 표시
    // 일기 쓴 날에 빨간 점 표시 + 이번 달 기록률(%) 통계 제공
    // ========================================================
    function MonthlyCalendarView({diaries, viewMonth, onSelect}) {
      const [y, m] = viewMonth.split("-").map(Number);
      const todayStr = today();
      const firstDow = new Date(y, m-1, 1).getDay();
      const daysInMonth = new Date(y, m, 0).getDate();
      const diaryDays = new Set();
      const diaryMap = {};
      diaries.forEach(d => { if(d.date.startsWith(viewMonth)) { diaryDays.add(parseInt(d.date.split("-")[2])); diaryMap[parseInt(d.date.split("-")[2])]=d; }});
      const todayDate = new Date(todayStr+"T00:00:00");
      const isCurrentMonth = y===todayDate.getFullYear() && m===todayDate.getMonth()+1;
      const passedDays = isCurrentMonth ? todayDate.getDate() : daysInMonth;
      const writtenCount = diaryDays.size;
      const pct = passedDays>0 ? Math.round(writtenCount/passedDays*100) : 0;

      const cells = [];
      for (let i=0; i<firstDow; i++) cells.push(null);
      for (let d=1; d<=daysInMonth; d++) cells.push(d);
      while (cells.length%7!==0) cells.push(null);

      const weekdays = ["일","월","화","수","목","금","토"];

      return (
        <div>
          {/* 달력 그리드 */}
          <div style={{background:T.card, borderRadius:16, padding:"16px 12px", boxShadow:T.shadow, marginBottom:14}}>
            <div style={{display:"grid", gridTemplateColumns:"repeat(7, 1fr)", gap:2, marginBottom:8}}>
              {weekdays.map(w=>(
                <div key={w} style={{textAlign:"center", fontSize:11, fontWeight:600, color:w==="일"?"#C97064":w==="토"?"#6B8EC4":T.textSub, padding:"4px 0"}}>{w}</div>
              ))}
            </div>
            <div style={{display:"grid", gridTemplateColumns:"repeat(7, 1fr)", gap:2}}>
              {cells.map((day,i)=>{
                if (!day) return <div key={i}/>;
                const dateStr = `${viewMonth}-${String(day).padStart(2,"0")}`;
                const hasEntry = diaryDays.has(day);
                const isTod = dateStr===todayStr;
                const isFuture = new Date(y,m-1,day) > todayDate;
                return (
                  <div key={i} onClick={()=>{ if(hasEntry && diaryMap[day]) onSelect(diaryMap[day]); }}
                    style={{textAlign:"center", padding:"8px 0", cursor:hasEntry?"pointer":"default", position:"relative", borderRadius:10, background:isTod?T.accentBg:"transparent"}}>
                    <div style={{fontSize:13, fontWeight:isTod?700:400, color:isFuture?T.border:isTod?T.accent:T.text}}>{day}</div>
                    {hasEntry && <div style={{width:8, height:8, borderRadius:"50%", background:"#E74C3C", margin:"2px auto 0"}}/>}
                  </div>
                );
              })}
            </div>
          </div>

          {/* 통계 */}
          <div style={{background:T.card, borderRadius:16, padding:"16px 20px", boxShadow:T.shadow}}>
            <div style={{fontSize:14, fontWeight:700, color:T.text, marginBottom:10}}>📊 이번 달 기록</div>
            <div style={{display:"flex", alignItems:"center", gap:12, marginBottom:8}}>
              <div style={{flex:1, height:8, borderRadius:4, background:T.bg, overflow:"hidden"}}>
                <div style={{width:`${pct}%`, height:"100%", borderRadius:4, background:T.gradient, transition:"width 0.5s ease"}}/>
              </div>
              <span style={{fontSize:13, fontWeight:700, color:T.accent, minWidth:40, textAlign:"right"}}>{pct}%</span>
            </div>
            <div style={{fontSize:12, color:T.textSub}}>
              {passedDays}일 중 <span style={{fontWeight:700, color:T.text}}>{writtenCount}일</span> 기록했어요
            </div>
          </div>
        </div>
      );
    }

    // ========================================================
    // 📊 WeeklyAISummary — "이번 주 나의 결" AI 분석 카드
    // 최근 7일간 쓴 일기를 Gemini AI가 자동으로 분석하여
    // 감정 흐름과 응원 메시지를 보여줌
    // 결과는 localStorage에 캐싱하여 같은 일기에 대해 재분석 방지
    // ========================================================
    function WeeklyAISummary({ diaries }) {
      const last7 = diaries.filter(d => {
        const days = Math.floor((new Date() - new Date(d.date + "T00:00:00")) / 86400000);
        return days < 7;
      });
      const cacheKey = `gyeol_weekly_${last7.map(d=>d.date).sort().join(",")}`;
      const [summary, setSummary] = useState(null);
      const [loading, setLoading] = useState(false);
      const [expanded, setExpanded] = useState(false);

      // cacheKey가 바뀔 때만 실행 — 캐시 있으면 바로 표시, 없으면 API 호출
      useEffect(() => {
        if (last7.length === 0) return;
        try {
          const hit = localStorage.getItem(cacheKey);
          if (hit) { setSummary(hit); setExpanded(true); return; }
        } catch {}
        // 캐시 없으면 생성
        setSummary(null);
        (async () => {
          setLoading(true); setExpanded(true);
          const ctx = last7.map(d =>
            `[${d.date}] 감정: ${(d.emotions||[]).map(e=>`${EMOTIONS[e.key]?.label}(강도${e.intensity})`).join(", ")||"없음"}`
          ).join("\n");
          const prompt = `아래 최근 7일 일기를 따뜻하게 분석해주세요. 전체 5줄 이내로 간결하게.\n\n${ctx}\n\n💜 이번 주 감정 흐름 한 줄\n🌱 한마디 응원 (슬픔·불안이 주를 이루면 전문 상담 부드럽게 제안)`;
          try {
            const text = await callGemini(prompt);
            setSummary(text);
            try { localStorage.setItem(cacheKey, text); } catch {}
          } catch {}
          setLoading(false);
        })();
      }, [cacheKey]);

      if (last7.length === 0) return null;

      return (
        <div style={{ background:"linear-gradient(135deg,#4A3728,#7A5C44)", borderRadius:16, padding:"16px 18px", marginBottom:14, color:"#fff", boxShadow:"0 4px 20px rgba(74,55,40,0.3)" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div>
              <div style={{ fontSize:14, fontWeight:800, marginBottom:2 }}>✨ 이번 주 나의 결</div>
              <div style={{ fontSize:11, opacity:0.75 }}>최근 7일 AI 분석 · {last7.length}개 일기</div>
            </div>
            <button
              onClick={() => setExpanded(e=>!e)}
              style={{ background:"rgba(255,255,255,0.18)", border:"none", borderRadius:10, padding:"7px 13px", color:"#fff", fontSize:12, fontWeight:700, cursor:"pointer", minHeight:34, opacity:loading?0.7:1 }}>
              {loading ? "분석 중..." : expanded ? "접기 ▲" : "펼치기 ▼"}
            </button>
          </div>
          {loading && (
            <div style={{ marginTop:14, fontSize:13, opacity:0.85, textAlign:"center", padding:"8px 0" }}>✨ AI가 일기를 읽고 있어요...</div>
          )}
          {summary && expanded && (
            <div style={{ marginTop:14, fontSize:13, lineHeight:1.85, whiteSpace:"pre-line", opacity:0.95, borderTop:"1px solid rgba(255,255,255,0.2)", paddingTop:14 }}>{summary}</div>
          )}
        </div>
      );
    }

    // ========================================================
    // ✨ DiaryAIModal — 개별 일기 AI 분석 팝업 (아래에서 올라오는 시트)
    // 특정 일기 하나를 Gemini AI가 분석하여 감정/하이라이트/응원 제공
    // 분석 결과는 DB(ai_analysis 컬럼)에 저장 + localStorage 캐싱
    // 이미 분석한 일기는 재분석 없이 저장된 결과를 바로 표시
    // ========================================================
    function DiaryAIModal({ diary, onClose, onAnalysisSaved }) {
      const cacheKey = `gyeol_ai_${diary.date}`;
      const initial = diary.ai_analysis || (() => { try { return localStorage.getItem(cacheKey); } catch { return null; } })();
      const [analysis, setAnalysis] = useState(initial || null);
      const [loading, setLoading] = useState(!initial);
      const [cached, setCached] = useState(!!initial);

      useEffect(() => {
        if (initial) return; // 캐시된 분석 있으면 API 호출 안 함
        (async () => {
          try {
            const ctx = `날짜: ${diary.date}\n제목: ${diary.title}\n내용: ${(diary.content||"").slice(0,200)}\n감정: ${(diary.emotions||[]).map(e=>`${EMOTIONS[e.key]?.label}(강도${e.intensity})`).join(", ")||"없음"}`;
            const prompt = `아래 하루 일기를 따뜻하고 공감 있게 분석해주세요. 전체 5줄 이내로 간결하게.\n\n${ctx}\n\n💜 감정 한 줄\n✨ 오늘의 하이라이트 한 줄\n🌱 내일을 위한 한마디 (부정적 감정이 강하면 상담 제안 포함)`;
            const text = await callGemini(prompt);
            setAnalysis(text);
            try { localStorage.setItem(cacheKey, text); } catch {}
            if (onAnalysisSaved) onAnalysisSaved(diary.id, text);
            sb.from('diary_entries').update({ ai_analysis: text }).eq('id', diary.id);
          } catch (e) {
            setAnalysis("분석을 가져올 수 없었어요. 잠시 후 다시 시도해주세요.");
          } finally {
            setLoading(false);
          }
        })();
      }, []);

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(74,55,40,0.6)", zIndex:250, display:"flex", flexDirection:"column", justifyContent:"flex-end" }} onClick={onClose}>
          <div onClick={e=>e.stopPropagation()} style={{ background:T.card, borderRadius:"20px 20px 0 0", maxHeight:"82vh", display:"flex", flexDirection:"column", boxShadow:"0 -8px 40px rgba(0,0,0,0.18)", paddingBottom:`env(safe-area-inset-bottom,0px)` }}>
            <div style={{ padding:"16px 20px", borderBottom:`1px solid ${T.border}`, display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ width:36, height:36, borderRadius:10, background:"linear-gradient(135deg,#4A3728,#7A5C44)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>✨</div>
                <div>
                  <div style={{ fontSize:15, fontWeight:700, color:T.text }}>AI 일기 분석</div>
                  <div style={{ fontSize:11, color:T.textSub, marginTop:1, maxWidth:220, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                    {diary.title}
                    {cached && <span style={{ marginLeft:6, background:"#e8f5e9", color:"#2e7d32", borderRadius:6, padding:"1px 6px", fontSize:10, fontWeight:700 }}>저장됨</span>}
                  </div>
                </div>
              </div>
              <button onClick={onClose} style={{ background:"none", border:"none", fontSize:22, cursor:"pointer", color:T.textSub, minWidth:44, minHeight:44, display:"flex", alignItems:"center", justifyContent:"center" }}>×</button>
            </div>
            <div style={{ flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch", padding:20 }}>
              {loading ? (
                <div style={{ textAlign:"center", padding:"50px 0", color:T.textSub }}>
                  <div style={{ fontSize:44, marginBottom:14, animation:"pulse 1.5s infinite" }}>✨</div>
                  <div style={{ fontSize:14, fontWeight:600, color:T.text, marginBottom:6 }}>AI가 일기를 읽고 있어요</div>
                  <div style={{ fontSize:12, opacity:0.7 }}>잠시만 기다려주세요...</div>
                </div>
              ) : (
                <div style={{ fontSize:14, lineHeight:1.9, color:T.text, whiteSpace:"pre-line" }}>{analysis}</div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ========================================================
    // 📖 DiaryDetail — 일기 상세 보기 화면 (전체 화면)
    // 날짜, 제목, 본문, 감정(강도 바), 사진을 보여줌
    // ========================================================
    function DiaryDetail({diary, onBack}) {
      const [signedPhotoUrl, setSignedPhotoUrl] = useState(null);
      useEffect(() => {
        if (diary.photo_url) getPhotoUrl(diary.photo_url).then(setSignedPhotoUrl);
      }, [diary.photo_url]);
      return (
        <div style={{position:"fixed", inset:0, background:T.bg, zIndex:50, display:"flex", flexDirection:"column"}}>
