    // ========================================================
    // 🧠 MBTI 분석 함수 — 일기 내용을 AI가 분석하여 MBTI 추측
    // 최근 일기 최대 7개를 Gemini에게 보내서 E/I, S/N, T/F, J/P 판별
    // 결과는 user_profiles 테이블에 저장됨
    // ========================================================
    async function analyzeMBTI(diaries, userId, displayName) {
      // 최신 일기 최대 7개 사용 (1개만 있어도 분석 가능)
      const sorted = [...diaries].sort((a, b) => b.date.localeCompare(a.date));
      const recent = sorted.slice(0, 7);
      if (recent.length === 0) return null;

      const diaryCtx = recent.map(d => {
        const emos = (d.emotions||[]).map(e => `${EMOTIONS[e.key]?.label||e.key}(강도${e.intensity})`).join(", ") || "없음";
        return `[${d.date}]\n제목: ${d.title}\n내용: ${(d.content||"").slice(0,300)}\n감정: ${emos}`;
      }).join("\n\n---\n\n");

      const prompt = `당신은 MBTI 성격유형 분석 전문가입니다. 아래 사용자의 일기를 분석하여 MBTI를 추측해주세요. 일기가 적더라도 가능한 단서를 최대한 활용하여 추측하세요.

## 분석 기준:

### E(외향) vs I(내향):
- 사람 언급 빈도 (많으면 E, 적으면 I)
- 사회적 활동 vs 혼자만의 활동
- "우리", "같이" vs "나", "혼자" 표현
- 에너지원: 사람과 만남=E, 혼자 시간=I

### S(감각) vs N(직관):
- 구체적 사실/수치/시간 기술=S vs 추상적/비유적 표현=N
- 순차적 일과 기록=S vs 의미 해석/패턴 발견=N
- 현실적 실용적 주제=S vs 미래/가능성/아이디어=N

### T(사고) vs F(감정):
- 원인-결과 분석적 서술=T vs 감정 중심 서술=F
- 문제 해결 초점=T vs 관계/공감 초점=F
- 감정 표현이 분석적=T vs 풍부하고 상세=F

### J(판단) vs P(인식):
- 계획/목표/일정 언급=J vs 즉흥/탐험/유연성=P
- "해야 한다", "완료했다"=J vs "해볼까", "갑자기"=P
- 체계적 구조=J vs 자유로운 흐름=P

## 중요:
- 일기 작성 자체가 내향적 행동이므로 E 신호가 있으면 가중치를 둘 것
- 한국어 문화적 맥락 고려
- 반드시 아래 JSON 형식으로만 응답:
{"mbti":"XXXX","confidence":{"E_I":"E 또는 I 선택 이유","S_N":"S 또는 N 선택 이유","T_F":"T 또는 F 선택 이유","J_P":"J 또는 P 선택 이유"}}

## 분석할 일기:

${diaryCtx}`;

      try {
        const result = await callGemini(prompt);
        // JSON 파싱 시도
        const jsonMatch = result.match(/\{[\s\S]*"mbti"[\s\S]*\}/);
        if (jsonMatch) {
          const parsed = JSON.parse(jsonMatch[0]);
          const mbti = parsed.mbti?.toUpperCase();
          if (mbti && /^[EI][SN][TF][JP]$/.test(mbti)) {
            // DB에 저장
            const { data: existing } = await sb.from('user_profiles').select('id').eq('user_id', userId).single();
            if (existing) {
              await sb.from('user_profiles').update({ mbti, mbti_updated_at: new Date().toISOString(), display_name: displayName }).eq('user_id', userId);
            } else {
              await sb.from('user_profiles').insert({ user_id: userId, mbti, mbti_updated_at: new Date().toISOString(), display_name: displayName });
            }
            return { mbti, confidence: parsed.confidence };
          }
        }
        return null;
      } catch (e) {
        console.error("MBTI 분석 오류:", e);
        return null;
      }
    }

    // ===== MBTI → 기질 그룹 매핑 =====
    // 16개 MBTI를 4개 기질 그룹으로 분류 (커뮤니티 채팅방 배정에 사용)
    // NT=분석가형, NF=외교관형, SJ=관리자형, SP=탐험가형
    const TEMPERAMENT_MAP = {
      INTJ:"NT", INTP:"NT", ENTJ:"NT", ENTP:"NT",
      INFJ:"NF", INFP:"NF", ENFJ:"NF", ENFP:"NF",
      ISTJ:"SJ", ISFJ:"SJ", ESTJ:"SJ", ESFJ:"SJ",
      ISTP:"SP", ISFP:"SP", ESTP:"SP", ESFP:"SP",
    };
    const MBTI_DESCRIPTIONS = {
      INTJ:"전략가", INTP:"논리술사", ENTJ:"통솔자", ENTP:"변론가",
      INFJ:"옹호자", INFP:"중재자", ENFJ:"선도자", ENFP:"활동가",
      ISTJ:"현실주의자", ISTP:"장인", ESTJ:"경영자", ESTP:"사업가",
      ISFJ:"수호자", ISFP:"모험가", ESFJ:"집정관", ESFP:"연예인",
    };
    const TEMPERAMENT_INFO = {
      NT: { label:"분석가형", emoji:"🧠", color:"#9B59B6", types:["INTJ","INTP","ENTJ","ENTP"], desc:"이성적이고 전략적인 사고를 즐기는 사람들" },
      NF: { label:"외교관형", emoji:"💚", color:"#2ECC71", types:["INFJ","INFP","ENFJ","ENFP"], desc:"따뜻하고 이상적인 세계를 꿈꾸는 사람들" },
      SJ: { label:"관리자형", emoji:"🛡️", color:"#3498DB", types:["ISTJ","ISFJ","ESTJ","ESFJ"], desc:"안정적이고 책임감 있게 세상을 지키는 사람들" },
      SP: { label:"탐험가형", emoji:"🌈", color:"#E67E22", types:["ISTP","ISFP","ESTP","ESFP"], desc:"자유롭고 순간을 즐기며 탐험하는 사람들" },
    };

    // ========================================================
    // 🎟️ 래플(응모) 시스템 — 일기를 쓰면 응모권을 받고 추첨에 참여
    // - 일기 1개 작성 = 응모권 1개
    // - 응모 시 1~10,000 사이 랜덤 번호 부여
    // - 매주 토요일 18시 마감, 20시 추첨, 21시 새 주차 시작
    // - 당첨 시 메가커피 기프티콘 증정
    // ========================================================

    // 현재 날짜가 몇 년도 몇 번째 주인지 계산 (예: "2026-W11")
    function getWeekKey(date = new Date()) {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      const weekNo = Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
      return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2, '0')}`;
    }

    // 현재 응모 상태 확인: open(응모 가능) / closed(마감) / drawing(추첨 중)
    function getRaffleStatus() {
      const now = new Date();
      const day = now.getDay();
      const hour = now.getHours();
      if (day === 6) {
        if (hour >= 18 && hour < 20) return 'closed';
        if (hour >= 20 && hour < 21) return 'drawing';
        if (hour >= 21) return 'open';
      }
      return 'open';
    }

    // 다음 응모 마감 시각 계산 (토요일 오후 6시)
    function getNextDeadline() {
      const now = new Date();
      const day = now.getDay();
      const daysUntilSat = (6 - day + 7) % 7 || 7;
      const deadline = new Date(now);
      if (day === 6 && now.getHours() < 18) {
        deadline.setHours(18, 0, 0, 0);
      } else {
        deadline.setDate(now.getDate() + (day === 6 ? 7 : daysUntilSat));
        deadline.setHours(18, 0, 0, 0);
      }
      return deadline;
    }

    // RaffleTab — "응모" 탭 화면 (카운트다운, 응모하기 버튼, 내 번호, 당첨 결과, 당첨 팝업)
    function RaffleTab({ ticketCount, onTicketChange }) {
      const { user } = useAuth();
      const [loading, setLoading] = useState(true);
      const [myEntries, setMyEntries] = useState([]);         // 이번 주 응모
      const [nextWeekEntries, setNextWeekEntries] = useState([]); // 다음 주 응모
      const [currentRound, setCurrentRound] = useState(null);
      const [lastRound, setLastRound] = useState(null);
      const [winnerBanner, setWinnerBanner] = useState(null);  // 당첨자 배너 정보
      const [entering, setEntering] = useState(false);
      const [newNumber, setNewNumber] = useState(null);
      const [showWinPopup, setShowWinPopup] = useState(false);
      const [winnerWeek, setWinnerWeek] = useState(null);
      const [claimContact, setClaimContact] = useState('');
      const [claimSubmitted, setClaimSubmitted] = useState(false);
      const [countdown, setCountdown] = useState('');

      const status = getRaffleStatus();
      const currentWeek = getWeekKey();
      // 응모가 들어갈 주차 (토요일 18시 이후 → 다음 주차)
      const entryWeek = (() => {
        const now = new Date();
        if (now.getDay() === 6 && now.getHours() >= 18) {
          const next = new Date(now); next.setDate(next.getDate() + 2);
          return getWeekKey(next);
        }
        if (now.getDay() === 0) {
          const next = new Date(now); next.setDate(next.getDate() + 1);
          return getWeekKey(next);
        }
        return currentWeek;
      })();
      // 이번 주 추첨 대상 주차 (현재 ISO 주차)
      const drawWeek = currentWeek;
      // 다음 주 주차 키
      const nextWeek = (() => {
        const now = new Date();
        const daysToAdd = now.getDay() === 0 ? 1 : (6 - now.getDay() + 2);
        const next = new Date(now); next.setDate(next.getDate() + daysToAdd);
        return getWeekKey(next);
      })();
      const isAfterDeadline = (() => {
        const now = new Date();
        return (now.getDay() === 6 && now.getHours() >= 18) || now.getDay() === 0;
      })();

      useEffect(() => {
        const tick = () => {
          const deadline = getNextDeadline();
          const diff = deadline - new Date();
          if (diff <= 0) { setCountdown('마감'); return; }
          const d = Math.floor(diff / 86400000);
          const h = Math.floor((diff % 86400000) / 3600000);
          const m = Math.floor((diff % 3600000) / 60000);
          const s = Math.floor((diff % 60000) / 1000);
          setCountdown(d > 0 ? `${d}일 ${h}시간 ${m}분` : `${h}시간 ${m}분 ${s}초`);
        };
        tick();
        const iv = setInterval(tick, 1000);
        return () => clearInterval(iv);
      }, []);

      useEffect(() => {
        if (!user) return;
        (async () => {
          setLoading(true);
          // 이번 주 응모 내역
          const { data: entries } = await sb.from('raffle_entries').select('*').eq('user_id', user.id).eq('week_key', drawWeek).order('created_at', { ascending: false });
          if (entries) setMyEntries(entries);
          // 다음 주 응모 내역 (마감 후 응모한 것)
          if (entryWeek !== drawWeek) {
            const { data: nextEntries } = await sb.from('raffle_entries').select('*').eq('user_id', user.id).eq('week_key', entryWeek).order('created_at', { ascending: false });
            if (nextEntries) setNextWeekEntries(nextEntries);
          } else {
            setNextWeekEntries([]);
          }
          // 이번 주 라운드
          const { data: round } = await sb.from('raffle_rounds').select('*').eq('week_key', drawWeek).single();
          setCurrentRound(round);
          // 지난 주 라운드 (당첨 확인)
          const lastWeekDate = new Date(); lastWeekDate.setDate(lastWeekDate.getDate() - 7);
          const lastWeekKey = getWeekKey(lastWeekDate);
          const { data: prevRound } = await sb.from('raffle_rounds').select('*').eq('week_key', lastWeekKey).single();
          setLastRound(prevRound);
          if (prevRound?.status === 'drawn' && prevRound?.winner_user_id === user.id) {
            const { data: claim } = await sb.from('raffle_claims').select('id').eq('user_id', user.id).eq('week_key', lastWeekKey).single();
            if (!claim) { setWinnerWeek(lastWeekKey); setShowWinPopup(true); }
          }
          // 토요일 당첨자 배너: 이번 주 또는 지난 주 당첨자 표시
          const now = new Date();
          if (now.getDay() === 6) {
            const bannerRound = round?.status === 'drawn' ? round : prevRound?.status === 'drawn' ? prevRound : null;
            if (bannerRound?.winner_email_masked) {
              setWinnerBanner(bannerRound.winner_email_masked);
            }
          } else {
            setWinnerBanner(null);
          }
          setLoading(false);
        })();
      }, [user, drawWeek, entryWeek]);

      // 추첨 트리거 (토 20시~21시) — 발급된 번호 중에서 무조건 당첨
      useEffect(() => {
        if (status !== 'drawing' || !user) return;
        (async () => {
          const { data: round } = await sb.from('raffle_rounds').select('*').eq('week_key', drawWeek).single();
          if (round?.status === 'drawn') { setCurrentRound(round); if (round.winner_email_masked) setWinnerBanner(round.winner_email_masked); return; }
          // 이번 주 모든 응모 번호 조회
          const { data: allEntries } = await sb.from('raffle_entries').select('number, user_id').eq('week_key', drawWeek);
          if (!allEntries || allEntries.length === 0) return;
          // 발급된 번호 중 랜덤 선택 → 무조건 당첨자 발생
          const winner = allEntries[Math.floor(Math.random() * allEntries.length)];
          const winNum = winner.number;
          const winnerId = winner.user_id;
          // 당첨자 이메일 마스킹 처리
          let maskedEmail = '';
          const { data: winnerProfile } = await sb.from('user_profiles').select('email').eq('user_id', winnerId).single();
          if (winnerProfile?.email) {
            const email = winnerProfile.email;
            const [local, domain] = email.split('@');
            maskedEmail = 'x'.repeat(Math.min(3, local.length)) + local.slice(3) + '@' + domain;
          }
          const updateData = { winning_number: winNum, winner_user_id: winnerId, status: 'drawn', winner_email_masked: maskedEmail || null };
          if (round) {
            await sb.from('raffle_rounds').update(updateData).eq('week_key', drawWeek);
          } else {
            await sb.from('raffle_rounds').insert({ week_key: drawWeek, ...updateData });
          }
          const { data: updated } = await sb.from('raffle_rounds').select('*').eq('week_key', drawWeek).single();
          setCurrentRound(updated);
          if (updated?.winner_email_masked) setWinnerBanner(updated.winner_email_masked);
          if (updated?.winner_user_id === user.id) { setWinnerWeek(drawWeek); setShowWinPopup(true); }
        })();
      }, [status, user]);

      const handleEnter = async () => {
        if (ticketCount < 1 || entering) return;
        setEntering(true); setNewNumber(null);
        const number = Math.floor(Math.random() * 10000) + 1;
        const targetWeek = entryWeek; // 마감 후에는 자동으로 다음 주
        const { data: round } = await sb.from('raffle_rounds').select('id').eq('week_key', targetWeek).single();
        if (!round) await sb.from('raffle_rounds').insert({ week_key: targetWeek, status: 'open' });
        const { error: entryErr } = await sb.from('raffle_entries').insert({ user_id: user.id, number, week_key: targetWeek });
        if (entryErr) { alert('응모 중 오류가 발생했습니다.'); setEntering(false); return; }
        const { data: profile } = await sb.from('user_profiles').select('ticket_count').eq('user_id', user.id).single();
        const newCount = Math.max(0, (profile?.ticket_count || 0) - 1);
        await sb.from('user_profiles').update({ ticket_count: newCount }).eq('user_id', user.id);
        onTicketChange(newCount);
        setNewNumber(number);
        const newEntry = { id: 'new-' + Date.now(), number, week_key: targetWeek, created_at: new Date().toISOString() };
        if (targetWeek === drawWeek) {
          setMyEntries(prev => [newEntry, ...prev]);
        } else {
          setNextWeekEntries(prev => [newEntry, ...prev]);
        }
        setTimeout(() => setEntering(false), 500);
      };

      const handleClaim = async () => {
        if (!claimContact.trim()) { alert('전화번호를 입력해주세요.'); return; }
        const round = lastRound?.week_key === winnerWeek ? lastRound : currentRound;
        await sb.from('raffle_claims').insert({ user_id: user.id, week_key: winnerWeek, name: '-', contact: claimContact.trim(), claimed_number: round?.winning_number || 0 });
        await sb.from('raffle_rounds').update({ winner_contact: claimContact.trim() }).eq('week_key', winnerWeek);
        setClaimSubmitted(true);
      };

      if (loading) return (
        <div style={{ textAlign: "center", padding: "80px 20px" }}>
          <div style={{ fontSize: 40, marginBottom: 16, animation: "pulse 1.5s infinite" }}>🎟️</div>
          <div style={{ fontSize: 14, color: T.textSub }}>응모 정보를 불러오는 중...</div>
        </div>
      );

      const isDrawn = currentRound?.status === 'drawn';
      const statusLabel = status === 'closed' ? '⏳ 이번 주 응모 마감 — 추첨 대기 중' : status === 'drawing' ? '🎰 추첨 진행 중...' : null;
      const canEnter = ticketCount >= 1 && !entering;
      const entryLabel = entering ? "🎰 번호 추첨 중..." : ticketCount < 1 ? "응모권이 없습니다 — 일기를 작성해보세요" : isAfterDeadline ? "🎟️ 다음 주 응모하기" : "🎟️ 응모하기";

      // 번호 목록 렌더링 헬퍼
      const renderEntryList = (entries, highlightNew) => (
        entries.length === 0 ? (
          <div style={{ background: T.card, borderRadius: 14, padding: "20px", textAlign: "center", boxShadow: T.shadow }}>
            <div style={{ fontSize: 13, color: T.textSub }}>아직 응모한 번호가 없어요</div>
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {entries.map((e, i) => (
              <div key={e.id} style={{ background: T.card, borderRadius: 12, padding: "14px 18px", boxShadow: T.shadow, display: "flex", alignItems: "center", justifyContent: "space-between", border: highlightNew && i === 0 && newNumber === e.number ? "2px solid #FFD700" : `1px solid ${T.border}`, animation: highlightNew && i === 0 && newNumber === e.number ? "slideUp 0.3s ease" : "none" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 36, height: 36, borderRadius: 10, background: T.accentBg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>🎟️</div>
                  <span style={{ fontSize: 18, fontWeight: 800, color: T.text, letterSpacing: 2 }}>#{String(e.number).padStart(4, '0')}</span>
                </div>
                <span style={{ fontSize: 11, color: T.textMuted }}>{new Date(e.created_at).toLocaleDateString('ko-KR', { month: 'numeric', day: 'numeric' })} {new Date(e.created_at).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })}</span>
              </div>
            ))}
          </div>
        )
      );

      return (
        <div style={{ padding: "20px 16px", paddingBottom: 40 }}>

          {/* 🎉 당첨자 축하 배너 (토요일 하루) */}
          {winnerBanner && (
            <div style={{ background: "linear-gradient(135deg,#FFD700,#FFA500)", borderRadius: 16, padding: "18px 20px", marginBottom: 16, textAlign: "center", animation: "slideUp 0.4s ease" }}>
              <div style={{ fontSize: 24, marginBottom: 6 }}>🎉</div>
              <div style={{ fontSize: 16, fontWeight: 800, color: "#4A3728", marginBottom: 4 }}>축하합니다!</div>
              <div style={{ fontSize: 14, fontWeight: 600, color: "#4A3728" }}>{winnerBanner} 고객님이 당첨됐습니다!</div>
            </div>
          )}

          <div style={{ fontSize: 20, fontWeight: 800, color: T.text, marginBottom: 4 }}>응모</div>
          <div style={{ fontSize: 13, color: T.textSub, marginBottom: 16 }}>일기를 쓰고 추첨에 참여하세요!</div>

          {statusLabel && (
            <div style={{ background: T.accentBg, borderRadius: 12, padding: "12px 16px", marginBottom: 14, textAlign: "center", fontSize: 14, fontWeight: 600, color: T.accent }}>{statusLabel}</div>
          )}

          {/* 응모 카드 */}
          <div style={{ background: "linear-gradient(135deg,#4A3728,#7A5C44)", borderRadius: 20, padding: "24px 20px", marginBottom: 20, color: "#fff", boxShadow: "0 6px 24px rgba(74,55,40,0.3)", textAlign: "center" }}>
            <div style={{ fontSize: 13, opacity: 0.8, marginBottom: 6 }}>{isAfterDeadline ? '다음 주 마감까지' : '마감까지'}</div>
            <div style={{ fontSize: 22, fontWeight: 800, marginBottom: 16, letterSpacing: 2 }}>{countdown}</div>
            <div style={{ background: "rgba(255,255,255,0.15)", borderRadius: 16, padding: "20px", marginBottom: 16 }}>
              <div style={{ fontSize: 14, opacity: 0.8, marginBottom: 6 }}>나의 응모권</div>
              <div style={{ fontSize: 42, fontWeight: 800, marginBottom: 4 }}>🎟️ {ticketCount}<span style={{ fontSize: 16, fontWeight: 500, opacity: 0.8 }}>개</span></div>
              <div style={{ fontSize: 11, opacity: 0.6 }}>일기 1개 작성 = 응모권 1개</div>
            </div>
            {newNumber && (
              <div style={{ marginBottom: 16, animation: "slideUp 0.5s ease" }}>
                <div style={{ fontSize: 13, opacity: 0.7, marginBottom: 6 }}>부여된 번호{isAfterDeadline ? ' (다음 주)' : ''}</div>
                <div style={{ fontSize: 36, fontWeight: 800, letterSpacing: 6, color: "#FFD700" }}>#{String(newNumber).padStart(4, '0')}</div>
              </div>
            )}
            <button onClick={handleEnter} disabled={!canEnter}
              style={{ width: "100%", padding: 16, borderRadius: 14, border: "none", background: canEnter ? "linear-gradient(135deg,#FFD700,#FFA500)" : "rgba(255,255,255,0.1)", color: canEnter ? "#4A3728" : "rgba(255,255,255,0.4)", fontSize: 16, fontWeight: 800, cursor: canEnter ? "pointer" : "default", minHeight: 52 }}>
              {entryLabel}
            </button>
          </div>

          {/* 이번 주 내 번호 */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: T.text, marginBottom: 10 }}>📋 이번 주 나의 번호</div>
            {renderEntryList(myEntries, !isAfterDeadline)}
          </div>

          {/* 다음 주 내 번호 (마감 후 응모분) */}
          {(isAfterDeadline || nextWeekEntries.length > 0) && (
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 15, fontWeight: 700, color: T.text, marginBottom: 10 }}>📋 다음 주 나의 번호</div>
              {renderEntryList(nextWeekEntries, isAfterDeadline)}
            </div>
          )}

          {isDrawn && (
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 15, fontWeight: 700, color: T.text, marginBottom: 10 }}>🎰 이번 주 추첨 결과</div>
              <div style={{ background: "linear-gradient(135deg,#FFD700,#FFA500)", borderRadius: 14, padding: "20px", textAlign: "center" }}>
                <div style={{ fontSize: 13, color: "#4A3728", marginBottom: 8 }}>당첨 번호</div>
                <div style={{ fontSize: 36, fontWeight: 800, color: "#4A3728", letterSpacing: 4 }}>#{String(currentRound.winning_number).padStart(4, '0')}</div>
              </div>
            </div>
          )}

          {/* 안내 */}
          <div style={{ background: T.card, borderRadius: 14, padding: "16px 18px", boxShadow: T.shadow }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: T.text, marginBottom: 8 }}>📌 응모 안내</div>
            <div style={{ fontSize: 12, color: T.textSub, lineHeight: 2 }}>
              • 일기 1개 작성 시 응모권 1개가 지급됩니다<br/>
              • 응모 시 1~10,000 중 랜덤 번호가 부여됩니다<br/>
              • 매주 토요일 오후 6시에 응모가 마감됩니다<br/>
              • 오후 6시 이후 응모는 다음 주에 반영됩니다<br/>
              • 매주 토요일 오후 8시에 당첨 번호가 추첨됩니다<br/>
              • 당첨 시 정보를 제출하면 상품이 지급됩니다
            </div>
          </div>

          {/* 당첨 팝업 */}
          {showWinPopup && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
              <div style={{ background: T.card, borderRadius: 20, padding: "30px 24px", maxWidth: 360, width: "100%", textAlign: "center", animation: "slideUp 0.4s ease" }}>
                {!claimSubmitted ? (
                  <>
                    <div style={{ fontSize: 60, marginBottom: 12 }}>🎉</div>
                    <div style={{ fontSize: 22, fontWeight: 800, color: T.text, marginBottom: 6 }}>축하합니다!</div>
                    <div style={{ fontSize: 14, color: T.textSub, marginBottom: 8, lineHeight: 1.7 }}>이번 주 추첨에 당첨되셨습니다!</div>
                    <div style={{ fontSize: 15, fontWeight: 700, color: T.accent, marginBottom: 8 }}>☕ 메가커피 아메리카노 기프티콘</div>
                    <div style={{ fontSize: 13, color: T.textSub, marginBottom: 20, lineHeight: 1.7 }}>2영업일 안으로 문자로 기프티콘을 발송해드립니다.<br/>수령하실 전화번호를 입력해주세요.</div>
                    <input value={claimContact} onChange={e => setClaimContact(e.target.value)} placeholder="010-0000-0000" type="tel" style={{ width: "100%", padding: 14, borderRadius: 12, border: `1.5px solid ${T.border}`, background: T.input, fontSize: 15, outline: "none", color: T.text, marginBottom: 16, fontFamily: "inherit", textAlign: "center", letterSpacing: 1 }} />
                    <button onClick={handleClaim} style={{ width: "100%", padding: 16, borderRadius: 14, border: "none", background: T.gradient, color: "#fff", fontSize: 16, fontWeight: 700, cursor: "pointer", minHeight: 52 }}>번호 제출하기</button>
                    <button onClick={() => setShowWinPopup(false)} style={{ marginTop: 10, background: "none", border: "none", fontSize: 13, color: T.textSub, cursor: "pointer" }}>나중에 하기</button>
                  </>
                ) : (
                  <>
                    <div style={{ fontSize: 60, marginBottom: 12 }}>✅</div>
                    <div style={{ fontSize: 20, fontWeight: 800, color: T.text, marginBottom: 8 }}>제출 완료!</div>
                    <div style={{ fontSize: 14, color: T.textSub, marginBottom: 20, lineHeight: 1.7 }}>2영업일 안으로 기프티콘을<br/>문자로 보내드리겠습니다!</div>
                    <button onClick={() => setShowWinPopup(false)} style={{ width: "100%", padding: 16, borderRadius: 14, border: "none", background: T.gradient, color: "#fff", fontSize: 16, fontWeight: 700, cursor: "pointer", minHeight: 52 }}>확인</button>
                  </>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ========================================================
    // 🔗 CommunityTab — "연대" 탭 화면
    // 1) MBTI 분석 전: "나의 MBTI를 알아보세요" 안내 + 분석 버튼
    // 2) MBTI 분석 후: 나의 MBTI 카드 + 기질 그룹 채팅방 입장
    // - MBTI는 7일 쿨다운 (7일에 한 번만 재분석 가능)
    // - 분석 후 자동으로 같은 기질 그룹방에 참여
    // ========================================================
    function CommunityTab({ diaries }) {
      const { user } = useAuth();
      const [mbti, setMbti] = useState(null);
      const [mbtiUpdatedAt, setMbtiUpdatedAt] = useState(null);
      const [analyzing, setAnalyzing] = useState(false);
      const [loadingProfile, setLoadingProfile] = useState(true);
      const [confidence, setConfidence] = useState(null);
      const [currentRoom, setCurrentRoom] = useState(null);
      const [myRooms, setMyRooms] = useState([]);
      const [memberCounts, setMemberCounts] = useState({});

      const myTemperament = mbti ? TEMPERAMENT_MAP[mbti] : null;

      // 7일 쿨다운 계산
      const COOLDOWN_DAYS = 7;
      const cooldownRemaining = (() => {
        if (!mbtiUpdatedAt) return 0;
        const updated = new Date(mbtiUpdatedAt);
        const now = new Date();
        const diffMs = now - updated;
        const diffDays = diffMs / (1000 * 60 * 60 * 24);
        const remaining = Math.ceil(COOLDOWN_DAYS - diffDays);
        return remaining > 0 ? remaining : 0;
      })();
      const canReanalyze = cooldownRemaining === 0;

      // 프로필 로드
      useEffect(() => {
        if (!user) return;
        (async () => {
          setLoadingProfile(true);
          const { data } = await sb.from('user_profiles').select('mbti, mbti_updated_at').eq('user_id', user.id).single();
          if (data?.mbti) {
            setMbti(data.mbti);
            setMbtiUpdatedAt(data.mbti_updated_at);
          }
          // 내가 참여한 방 로드
          const { data: members } = await sb.from('mbti_chat_members').select('room_id, mbti_chat_rooms(mbti, room_type)').eq('user_id', user.id);
          if (members) setMyRooms(members.map(m => ({ room_id: m.room_id, mbti: m.mbti_chat_rooms?.mbti, room_type: m.mbti_chat_rooms?.room_type })));
          setLoadingProfile(false);
        })();
      }, [user]);

      // 나의 그룹방 멤버 수 로드
      useEffect(() => {
        if (!mbti) return;
        const temperament = TEMPERAMENT_MAP[mbti];
        if (!temperament) return;
        (async () => {
          const { data: room } = await sb.from('mbti_chat_rooms').select('id').eq('mbti', temperament).single();
          if (!room) return;
          const { count } = await sb.from('mbti_chat_members').select('*', { count: 'exact', head: true }).eq('room_id', room.id);
          setMemberCounts({ [temperament]: count || 0 });
        })();
      }, [myRooms, mbti]);

      // MBTI 분석 후 기질 그룹방에 자동 참여
      const autoJoinGroupRoom = async (mbtiResult) => {
        const temperament = TEMPERAMENT_MAP[mbtiResult];
        if (!temperament) return;
        const { data: room } = await sb.from('mbti_chat_rooms').select('id').eq('mbti', temperament).single();
        if (!room) return;
        const { data: existing } = await sb.from('mbti_chat_members').select('id').eq('room_id', room.id).eq('user_id', user.id).single();
        if (!existing) {
          await sb.from('mbti_chat_members').insert({ room_id: room.id, user_id: user.id });
        }
        setMyRooms(prev => {
          if (prev.some(r => r.mbti === temperament)) return prev;
          return [...prev, { room_id: room.id, mbti: temperament, room_type: 'group' }];
        });
      };

      const handleAnalyze = async () => {
        if (mbti && !canReanalyze) {
          alert(`MBTI는 ${COOLDOWN_DAYS}일간 유지됩니다. ${cooldownRemaining}일 후 재분석할 수 있어요.`);
          return;
        }
        setAnalyzing(true);
        const result = await analyzeMBTI(diaries, user.id, user.name);
        if (result) {
          setMbti(result.mbti);
          setMbtiUpdatedAt(new Date().toISOString());
          setConfidence(result.confidence);
          await autoJoinGroupRoom(result.mbti);
        } else {
          alert("MBTI 분석에 실패했어요. 일기가 있는지 확인해주세요.");
        }
        setAnalyzing(false);
      };

      // 기존 MBTI가 있는데 그룹방에 아직 안 들어간 경우 자동 참여
      useEffect(() => {
        if (!mbti || loadingProfile) return;
        const temperament = TEMPERAMENT_MAP[mbti];
        if (!temperament) return;
        if (myRooms.some(r => r.mbti === temperament)) return;
        autoJoinGroupRoom(mbti);
      }, [mbti, loadingProfile]);

      const handleJoinRoom = async (roomMbti) => {
        const { data: room } = await sb.from('mbti_chat_rooms').select('id, room_type').eq('mbti', roomMbti).single();
        if (!room) return;
        const { data: existing } = await sb.from('mbti_chat_members').select('id').eq('room_id', room.id).eq('user_id', user.id).single();
        if (!existing) {
          await sb.from('mbti_chat_members').insert({ room_id: room.id, user_id: user.id });
        }
        setMyRooms(prev => {
          if (prev.some(r => r.mbti === roomMbti)) return prev;
          return [...prev, { room_id: room.id, mbti: roomMbti, room_type: room.room_type }];
        });
        setCurrentRoom({ room_id: room.id, mbti: roomMbti });
      };

      if (currentRoom) {
        const isMyGroupRoom = currentRoom.mbti === myTemperament;
        return <ChatRoom roomId={currentRoom.room_id} mbti={currentRoom.mbti} onBack={() => setCurrentRoom(null)} lockLeave={isMyGroupRoom && !canReanalyze} cooldownRemaining={cooldownRemaining} />;
      }

      if (loadingProfile) {
        return (
          <div style={{ textAlign: "center", padding: "80px 20px" }}>
            <div style={{ fontSize: 32, marginBottom: 16, animation: "pulse 1.5s infinite" }}>🔗</div>
            <div style={{ fontSize: 14, color: T.textSub }}>연대 정보를 불러오는 중...</div>
          </div>
        );
      }

      // MBTI 분석 전 상태
      if (!mbti) {
        const diaryCount = diaries.length;
        return (
          <div style={{ padding: "30px 16px" }}>
            <div style={{ fontSize: 20, fontWeight: 800, color: T.text, marginBottom: 4 }}>연대</div>
            <div style={{ fontSize: 13, color: T.textSub, marginBottom: 20 }}>결이 맞는 사람들과 연결되세요</div>
            <div style={{ background: T.card, borderRadius: 16, padding: 24, boxShadow: T.shadow, textAlign: "center" }}>
              <div style={{ fontSize: 48, marginBottom: 16 }}>🧠</div>
              <div style={{ fontSize: 17, fontWeight: 700, color: T.text, marginBottom: 8 }}>나의 MBTI를 알아보세요</div>
              <div style={{ fontSize: 14, color: T.textSub, lineHeight: 1.8, marginBottom: 20 }}>
                작성한 일기를 AI가 분석하여<br />당신의 MBTI 성격유형을 추측합니다.
              </div>
              <div style={{ fontSize: 13, color: T.accent, fontWeight: 600, marginBottom: 20, padding: "10px 16px", background: T.accentBg, borderRadius: 12 }}>
                작성한 일기: {diaryCount}개 {diaryCount === 0 && "— 일기를 먼저 작성해주세요"}
              </div>
              <button onClick={handleAnalyze} disabled={analyzing || diaryCount === 0}
                style={{ width: "100%", padding: 16, borderRadius: 14, border: "none", background: diaryCount > 0 ? T.gradient : T.border, color: diaryCount > 0 ? "#fff" : T.textSub, fontSize: 16, fontWeight: 700, cursor: diaryCount > 0 ? "pointer" : "default", opacity: analyzing ? 0.7 : 1, minHeight: 52 }}>
                {analyzing ? "✨ AI가 분석 중..." : "나의 결 유형 분석하기"}
              </button>
            </div>
          </div>
        );
      }

      // MBTI 확인 상태 — 그룹방 중심 UI
      const myGroup = TEMPERAMENT_INFO[myTemperament];

      return (
        <div style={{ padding: "20px 16px", paddingBottom: 20 }}>
          <div style={{ fontSize: 20, fontWeight: 800, color: T.text, marginBottom: 4 }}>연대</div>
          <div style={{ fontSize: 13, color: T.textSub, marginBottom: 16 }}>결이 맞는 사람들과 연결되세요</div>

          {/* 내 MBTI 카드 */}
          <div style={{ background: "linear-gradient(135deg,#4A3728,#7A5C44)", borderRadius: 16, padding: "20px", marginBottom: 16, color: "#fff", boxShadow: "0 4px 20px rgba(74,55,40,0.3)" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div>
                <div style={{ fontSize: 12, opacity: 0.75, marginBottom: 4 }}>나의 결 유형</div>
                <div style={{ display: "flex", alignItems: "baseline", gap: 10 }}>
                  <span style={{ fontSize: 28, fontWeight: 800, letterSpacing: 4 }}>{mbti}</span>
                  {myGroup && <span style={{ fontSize: 14, opacity: 0.85, background: myGroup.color + "44", padding: "3px 10px", borderRadius: 8 }}>{myGroup.emoji} {myGroup.label}</span>}
                </div>
                <div style={{ fontSize: 14, opacity: 0.9, marginTop: 4 }}>{MBTI_DESCRIPTIONS[mbti] || ""}</div>
              </div>
              <button onClick={handleAnalyze} disabled={analyzing || !canReanalyze}
                style={{ background: canReanalyze ? "rgba(255,255,255,0.2)" : "rgba(255,255,255,0.08)", border: "none", borderRadius: 10, padding: "8px 14px", color: "#fff", fontSize: 12, fontWeight: 600, cursor: canReanalyze ? "pointer" : "default", minHeight: 36, opacity: canReanalyze ? 1 : 0.6 }}>
                {analyzing ? "분석 중..." : canReanalyze ? "재분석" : `${cooldownRemaining}일 후 가능`}
              </button>
            </div>
            {!canReanalyze && (
              <div style={{ marginTop: 12, fontSize: 11, opacity: 0.7, display: "flex", alignItems: "center", gap: 6 }}>
                🔒 {cooldownRemaining}일간 유형이 유지됩니다 · {mbtiUpdatedAt ? new Date(mbtiUpdatedAt).toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' }) + ' 분석' : ''}
              </div>
            )}
            {confidence && (
              <div style={{ marginTop: 14, paddingTop: 14, borderTop: "1px solid rgba(255,255,255,0.2)", fontSize: 12, lineHeight: 1.8, opacity: 0.85 }}>
                {Object.entries(confidence).map(([k, v]) => (
                  <div key={k}><span style={{ fontWeight: 700 }}>{k}:</span> {v}</div>
                ))}
              </div>
            )}
          </div>

          {/* 내 기질 그룹방 (메인) */}
          {myGroup && (
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 15, fontWeight: 700, color: T.text, marginBottom: 10 }}>🏠 나의 커뮤니티</div>
              <div onClick={() => handleJoinRoom(myTemperament)}
                style={{ background: T.card, borderRadius: 16, padding: "18px 20px", boxShadow: T.shadowHover, border: `2px solid ${myGroup.color}`, cursor: "pointer" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 44, height: 44, borderRadius: 14, background: myGroup.color + "22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>{myGroup.emoji}</div>
                    <div>
                      <div style={{ fontSize: 16, fontWeight: 700, color: T.text }}>{myGroup.label} 방</div>
                      <div style={{ fontSize: 12, color: T.textSub, marginTop: 1 }}>{memberCounts[myTemperament] || 0}명 참여 중</div>
                    </div>
                  </div>
                  <div style={{ padding: "8px 16px", borderRadius: 10, background: myGroup.color, color: "#fff", fontSize: 13, fontWeight: 700 }}>입장</div>
                </div>
                <div style={{ fontSize: 13, color: T.textSub, lineHeight: 1.7 }}>{myGroup.desc}</div>
                <div style={{ display: "flex", gap: 6, marginTop: 10, flexWrap: "wrap" }}>
                  {myGroup.types.map(t => (
                    <span key={t} style={{ fontSize: 11, padding: "3px 10px", borderRadius: 10, background: t === mbti ? myGroup.color + "33" : T.bg, border: `1px solid ${t === mbti ? myGroup.color : T.border}`, color: t === mbti ? myGroup.color : T.textSub, fontWeight: t === mbti ? 700 : 400 }}>
                      {t}{t === mbti ? " ← 나" : ""} {MBTI_DESCRIPTIONS[t]}
                    </span>
                  ))}
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // ========================================================
    // 💬 ChatRoom — MBTI 기질 그룹 채팅방
    // 같은 기질(NT/NF/SJ/SP) 사용자들끼리 채팅
    // - 30초마다 새 메시지 자동 갱신 (폴링 방식)
    // - 낙관적 업데이트: 메시지 전송 시 즉시 화면에 표시
    // - 날짜별 구분선, 시간 표시, 프로필 이니셜 아바타
    // - 쿨다운 기간 중에는 방 나가기 불가 (잠금 표시)
    // ========================================================
    function ChatRoom({ roomId, mbti, onBack, lockLeave = false, cooldownRemaining = 0 }) {
      const { user } = useAuth();
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(true);
      const [sending, setSending] = useState(false);
      const [members, setMembers] = useState([]);
      const [showLeaveConfirm, setShowLeaveConfirm] = useState(false);
      const messagesEndRef = useRef(null);
      const scrollContainerRef = useRef(null);

      const isGroupRoom = TEMPERAMENT_INFO[mbti];
      const roomLabel = isGroupRoom ? `${isGroupRoom.emoji} ${isGroupRoom.label} 방` : `${mbti} 방`;
      const ROOM_DESC = isGroupRoom
        ? isGroupRoom.desc + "\n이 방은 가장 당신과 잘 어울리는 결이 맞는 사람들이 연결된 방입니다. 편하게 소통하세요"
        : "이 방은 가장 당신과 잘 어울리는 결이 맞는 사람들이 연결된 방입니다. 편하게 소통하세요";

      // 메시지 로드
      const loadMessages = useCallback(async () => {
        const { data } = await sb.from('mbti_chat_messages')
          .select('*')
          .eq('room_id', roomId)
          .order('created_at', { ascending: true })
          .limit(200);
        if (data) setMessages(data);
        setLoading(false);
      }, [roomId]);

      // 멤버 로드
      const loadMembers = useCallback(async () => {
        const { data } = await sb.from('mbti_chat_members')
          .select('user_id, joined_at')
          .eq('room_id', roomId);
        if (data) setMembers(data);
      }, [roomId]);

      useEffect(() => {
        loadMessages();
        loadMembers();
        // 30초마다 새 메시지 폴링 (실시간 불필요)
        const interval = setInterval(() => {
          loadMessages();
        }, 30000);
        return () => clearInterval(interval);
      }, [loadMessages, loadMembers]);

      // 스크롤 하단으로
      useEffect(() => {
        if (messagesEndRef.current) {
          messagesEndRef.current.scrollIntoView({ behavior: "smooth" });
        }
      }, [messages]);

      const handleSend = async () => {
        const text = input.trim();
        if (!text || sending) return;
        setSending(true);
        setInput("");
        const newMsg = {
          room_id: roomId,
          user_id: user.id,
          content: text,
          display_name: user.name,
        };
        // 즉시 로컬에 추가 (낙관적 업데이트)
        const tempMsg = { ...newMsg, id: 'temp-' + Date.now(), created_at: new Date().toISOString() };
        setMessages(prev => [...prev, tempMsg]);

        const { error } = await sb.from('mbti_chat_messages').insert(newMsg);
        if (error) {
          console.error("메시지 전송 오류:", error);
          setMessages(prev => prev.filter(m => m.id !== tempMsg.id));
          setInput(text);
        } else {
          // 서버에서 다시 로드하여 정확한 데이터 반영
          await loadMessages();
        }
        setSending(false);
      };

      const handleLeave = async () => {
        await sb.from('mbti_chat_members').delete().eq('room_id', roomId).eq('user_id', user.id);
        onBack();
      };

      const fmtTime = (iso) => {
        const d = new Date(iso);
        const h = d.getHours();
        const m = String(d.getMinutes()).padStart(2, "0");
        const ampm = h >= 12 ? "오후" : "오전";
        const h12 = h % 12 || 12;
        return `${ampm} ${h12}:${m}`;
      };
      const fmtDate = (iso) => {
        const d = new Date(iso);
        return `${d.getMonth() + 1}월 ${d.getDate()}일`;
      };

      // 날짜 구분선을 위한 그룹핑
      let lastDate = "";

      return (
        <div style={{ position: "fixed", inset: 0, background: T.bg, zIndex: 10, display: "flex", flexDirection: "column" }}>
          {/* 헤더 */}
          <div style={{ background: T.card, borderBottom: `1px solid ${T.border}`, padding: "0 16px", paddingTop: `calc(env(safe-area-inset-top,0px) + 10px)`, paddingBottom: 10, display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <button onClick={onBack} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: T.textSub, minWidth: 40, minHeight: 40, display: "flex", alignItems: "center" }}>←</button>
              <div>
                <div style={{ fontSize: 16, fontWeight: 700, color: T.text }}>{roomLabel}</div>
                <div style={{ fontSize: 11, color: T.textSub }}>{members.length}명 참여 중</div>
              </div>
            </div>
            {lockLeave ? (
              <div style={{ background: T.bg, border: `1px solid ${T.border}`, borderRadius: 10, padding: "8px 14px", fontSize: 11, color: T.textSub, fontWeight: 500, minHeight: 36, display: "flex", alignItems: "center" }}>
                🔒 {cooldownRemaining}일 후 변경 가능
              </div>
            ) : (
              <button onClick={() => setShowLeaveConfirm(true)}
                style={{ background: T.bg, border: `1px solid ${T.border}`, borderRadius: 10, padding: "8px 14px", fontSize: 12, color: T.danger, fontWeight: 600, cursor: "pointer", minHeight: 36 }}>
                나가기
              </button>
            )}
          </div>

          {/* 메시지 영역 */}
          <div ref={scrollContainerRef} style={{ flex: 1, overflowY: "auto", WebkitOverflowScrolling: "touch", padding: "16px 14px" }}>
            {/* 방 설명 */}
            <div style={{ textAlign: "center", marginBottom: 20 }}>
              <div style={{ display: "inline-block", background: T.accentBg, borderRadius: 16, padding: "14px 20px", maxWidth: 300 }}>
                <div style={{ fontSize: 13, color: T.text, lineHeight: 1.8, fontWeight: 500 }}>{ROOM_DESC}</div>
              </div>
            </div>

            {loading ? (
              <div style={{ textAlign: "center", padding: 40, color: T.textSub }}>
                <div style={{ fontSize: 14 }}>메시지를 불러오는 중...</div>
              </div>
            ) : messages.length === 0 ? (
              <div style={{ textAlign: "center", padding: 40, color: T.textSub }}>
                <div style={{ fontSize: 32, marginBottom: 12 }}>💬</div>
                <div style={{ fontSize: 14, lineHeight: 1.7 }}>아직 대화가 없어요.<br />첫 메시지를 보내보세요!</div>
              </div>
            ) : (
              messages.map((msg, i) => {
                const isMe = msg.user_id === user.id;
                const msgDate = fmtDate(msg.created_at);
                let showDateLine = false;
                if (msgDate !== lastDate) {
                  showDateLine = true;
                  lastDate = msgDate;
                }
                return (
                  <React.Fragment key={msg.id}>
                    {showDateLine && (
                      <div style={{ textAlign: "center", margin: "16px 0 12px" }}>
                        <span style={{ background: T.border, padding: "4px 14px", borderRadius: 12, fontSize: 11, color: T.textSub, fontWeight: 500 }}>{msgDate}</span>
                      </div>
                    )}
                    <div style={{ display: "flex", flexDirection: isMe ? "row-reverse" : "row", alignItems: "flex-end", gap: 6, marginBottom: 10 }}>
                      {!isMe && (
                        <div style={{ width: 32, height: 32, borderRadius: "50%", background: T.accentBg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, color: T.accent, flexShrink: 0 }}>
                          {(msg.display_name || "?")[0]}
                        </div>
                      )}
                      <div style={{ maxWidth: "70%" }}>
                        {!isMe && <div style={{ fontSize: 11, color: T.textSub, marginBottom: 3, paddingLeft: 4 }}>{msg.display_name}</div>}
                        <div style={{ background: isMe ? T.accent : T.card, color: isMe ? "#fff" : T.text, padding: "10px 14px", borderRadius: isMe ? "16px 16px 4px 16px" : "16px 16px 16px 4px", fontSize: 14, lineHeight: 1.7, boxShadow: isMe ? "none" : T.shadow, border: isMe ? "none" : `1px solid ${T.border}`, wordBreak: "break-word" }}>
                          {msg.content}
                        </div>
                        <div style={{ fontSize: 10, color: T.textMuted, marginTop: 3, textAlign: isMe ? "right" : "left", paddingLeft: isMe ? 0 : 4, paddingRight: isMe ? 4 : 0 }}>
                          {fmtTime(msg.created_at)}
                        </div>
                      </div>
                    </div>
                  </React.Fragment>
                );
              })
            )}
            <div ref={messagesEndRef} />
          </div>

          {/* 메시지 입력 */}
          <div style={{ background: T.card, borderTop: `1px solid ${T.border}`, padding: "10px 14px", paddingBottom: `calc(env(safe-area-inset-bottom,0px) + 10px)`, display: "flex", gap: 8, flexShrink: 0 }}>
            <input value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && handleSend()}
              placeholder="메시지를 입력하세요..."
              style={{ flex: 1, padding: "12px 16px", borderRadius: 22, border: `1px solid ${T.border}`, background: T.bg, fontSize: 15, outline: "none", color: T.text, fontFamily: "inherit" }} />
            <button onClick={handleSend} disabled={!input.trim() || sending}
              style={{ width: 44, height: 44, borderRadius: "50%", border: "none", background: input.trim() ? T.accent : T.border, color: "#fff", cursor: input.trim() ? "pointer" : "default", fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              ↑
            </button>
          </div>

          {/* 나가기 확인 */}
          {showLeaveConfirm && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(74,55,40,0.5)", zIndex: 200, display: "flex", flexDirection: "column", justifyContent: "flex-end" }} onClick={() => setShowLeaveConfirm(false)}>
              <div onClick={e => e.stopPropagation()} style={{ background: T.card, borderRadius: "20px 20px 0 0", padding: "24px 20px", paddingBottom: `calc(env(safe-area-inset-bottom,0px) + 24px)`, textAlign: "center" }}>
                <div style={{ width: 36, height: 4, borderRadius: 2, background: T.border, margin: "0 auto 20px" }} />
                <div style={{ fontSize: 36, marginBottom: 10 }}>👋</div>
                <div style={{ fontSize: 16, fontWeight: 700, color: T.text, marginBottom: 6 }}>이 방을 나가시겠어요?</div>
                <div style={{ fontSize: 14, color: T.textSub, marginBottom: 20, lineHeight: 1.6 }}>나가면 채팅 내역을 볼 수 없어요.<br />다시 입장하면 볼 수 있어요.</div>
                <div style={{ display: "flex", gap: 10 }}>
                  <button onClick={() => setShowLeaveConfirm(false)} style={{ flex: 1, padding: 15, borderRadius: 12, border: `1px solid ${T.border}`, background: T.card, fontSize: 15, fontWeight: 600, color: T.textSub, cursor: "pointer", minHeight: 50 }}>취소</button>
                  <button onClick={handleLeave} style={{ flex: 1, padding: 15, borderRadius: 12, border: "none", background: T.danger, color: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer", minHeight: 50 }}>나가기</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ========================================================
    // ✨ StatsTab — "나의 결" 탭 화면
    // 전체 일기에서 감정 통계를 보여줌 (감정별 점수 합산, 순위, 바 차트)
    // "AI에게 나의 결 물어보기" 버튼으로 AI 채팅 열기
    // ========================================================
    function StatsTab({diaries, onOpenAI}) {
      const allEmo = {}; diaries.forEach(d=>(d.emotions||[]).forEach(e=>{allEmo[e.key]=(allEmo[e.key]||0)+e.intensity;}));
      const emoSorted = Object.entries(allEmo).sort((a,b)=>b[1]-a[1]); const maxEmo = emoSorted[0]?.[1]||1;
      if (diaries.length===0) return (<div style={{padding:"80px 20px", textAlign:"center"}}><div style={{fontSize:48, marginBottom:16}}>✨</div><div style={{fontSize:16, fontWeight:700, color:T.text, marginBottom:8}}>아직 기록이 없어요</div><div style={{fontSize:14, color:T.textSub, lineHeight:1.7}}>일기를 쓰기 시작하면<br/>나의 결이 보이기 시작해요.</div></div>);
      return (
        <div style={{padding:"20px 16px", paddingBottom:20}}>
          <div style={{fontSize:20, fontWeight:800, color:T.text, marginBottom:4}}>나의 결</div>
          <div style={{fontSize:13, color:T.textSub, marginBottom:14}}>기록이 쌓일수록 결이 선명해집니다</div>
          <button onClick={onOpenAI} style={{width:"100%", padding:"14px 18px", borderRadius:14, border:"none", background:T.gradient, color:"#fff", fontSize:15, fontWeight:700, cursor:"pointer", marginBottom:16, minHeight:48, display:"flex", alignItems:"center", justifyContent:"center", gap:8, boxShadow:`0 4px 16px ${T.accent}44`}}>☕ AI에게 나의 결 물어보기</button>
          {emoSorted.length>0 && (
            <div style={{background:T.card, borderRadius:16, padding:20, marginBottom:12, boxShadow:T.shadow}}>
              <div style={{fontSize:14, fontWeight:700, color:T.text, marginBottom:14}}>🎭 감정의 결</div>
              <div style={{display:"flex", flexWrap:"wrap", gap:8, marginBottom:16}}>
                {emoSorted.map(([k,v])=>{const e=EMOTIONS[k]; if(!e) return null; return (<div key={k} style={{padding:"10px 14px", borderRadius:12, background:e.color+"22", textAlign:"center", border:`1px solid ${e.color}44`}}><div style={{fontSize:20}}>{e.emoji}</div><div style={{fontSize:11, fontWeight:600, color:T.text, marginTop:3}}>{e.label}</div><div style={{fontSize:10, color:T.textSub}}>{v}점</div></div>);})}
              </div>
              {emoSorted.map(([k,v],i)=>{const e=EMOTIONS[k]; if(!e) return null; return (<div key={k} style={{display:"flex", alignItems:"center", gap:10, marginBottom:10}}><span style={{fontSize:12, fontWeight:700, color:T.textSub, minWidth:18}}>{i+1}</span><span style={{fontSize:16}}>{e.emoji}</span><span style={{fontSize:13, fontWeight:600, color:T.text, minWidth:50}}>{e.label}</span><div style={{flex:1, height:8, borderRadius:4, background:T.border}}><div style={{height:"100%", borderRadius:4, background:e.color, width:`${(v/maxEmo)*100}%`}}/></div><span style={{fontSize:12, color:T.textSub, minWidth:28, textAlign:"right"}}>{v}점</span></div>);})}
            </div>
          )}
        </div>
      );
    }

    // ========================================================
    // 👤 MyPage — "마이페이지" 탭 화면
    // - 프로필 정보 (이름, 이메일, 기록 통계)
    // - 이용약관 / 개인정보처리방침 보기
    // - 엑셀 내보내기 (일기+프로필 데이터를 .xlsx 파일로 다운로드)
    // - 문의하기 (이메일 연결)
    // - 로그아웃 버튼
    // ========================================================
    function MyPage({diaries, streak}) {
      const {user, logout} = useAuth();
      const photoCount = diaries.filter(d=>d.photo_url).length;
      const [loggingOut, setLoggingOut] = useState(false);
      const [showLegal, setShowLegal] = useState(null);
      const [exporting, setExporting] = useState(false);
      const handleLogout = async () => { setLoggingOut(true); await logout(); };

      const EMOTION_MAP = {"happy":"행복","grateful":"감사","calm":"평온","excited":"설렘","proud":"뿌듯","loving":"사랑","hopeful":"희망","amused":"즐거움","sad":"슬픔","angry":"분노","anxious":"불안","lonely":"외로움","tired":"지침","frustrated":"답답","guilty":"죄책감","jealous":"질투","bored":"지루함","confused":"혼란","nostalgic":"그리움","overwhelmed":"벅참","empty":"공허","regretful":"후회"};

      const handleExportExcel = async () => {
        if (exporting || !user) return;
        setExporting(true);
        try {
          const wb = XLSX.utils.book_new();

          // 시트1: 일기 전체
          const diaryRows = diaries.sort((a,b)=>a.date.localeCompare(b.date)).map(d => {
            const emos = (d.emotions||[]).map(e => `${EMOTION_MAP[e.key]||e.key}(${e.intensity}/5)`).join(', ');
            return {
              "날짜": d.date,
              "제목": d.title||'',
              "내용": (d.content||'').replace(/<[^>]*>/g,''),
              "감정": emos,
              "사진": d.photo_url ? '있음' : '',
              "공개여부": d.is_public === false ? '비공개' : '공개',
              "AI 분석": d.ai_analysis||''
            };
          });
          const ws1 = XLSX.utils.json_to_sheet(diaryRows);
          ws1['!cols'] = [{wch:12},{wch:25},{wch:60},{wch:30},{wch:6},{wch:8},{wch:50}];
          XLSX.utils.book_append_sheet(wb, ws1, "일기");

          // 시트2: 프로필 요약
          const {data: profile} = await sb.from('user_profiles').select('*').eq('user_id', user.id).single();
          const profileRows = [{
            "이름": user.name||'',
            "이메일": user.email||'',
            "MBTI": profile?.mbti||'미설정',
            "총 일기 수": diaries.length,
            "연속 기록": streak,
            "사진 기록": photoCount,
            "가입일": profile?.created_at ? new Date(profile.created_at).toLocaleDateString('ko-KR') : ''
          }];
          const ws2 = XLSX.utils.json_to_sheet(profileRows);
          ws2['!cols'] = [{wch:15},{wch:25},{wch:8},{wch:10},{wch:10},{wch:10},{wch:12}];
          XLSX.utils.book_append_sheet(wb, ws2, "프로필");

          const today = new Date().toISOString().slice(0,10);
          XLSX.writeFile(wb, `GYEOL_내보내기_${today}.xlsx`);
        } catch(err) {
          console.error(err);
          alert('내보내기 중 오류가 발생했습니다.');
        } finally {
          setExporting(false);
        }
      };
      return (
        <div style={{padding:"20px 16px", paddingBottom:20}}>
          {showLegal && <LegalModal type={showLegal} onClose={()=>setShowLegal(null)}/>}
          <div style={{fontSize:20, fontWeight:800, color:T.text, marginBottom:16}}>마이페이지</div>
          <div style={{background:T.card, borderRadius:16, padding:24, marginBottom:12, boxShadow:T.shadow}}>
            <div style={{display:"flex", alignItems:"center", gap:14, marginBottom:20}}>
              <div style={{width:56, height:56, borderRadius:"50%", background:T.accentBg, display:"flex", alignItems:"center", justifyContent:"center", fontSize:24, fontWeight:700, color:T.accent, flexShrink:0}}>{user?.name?.[0]||"?"}</div>
              <div><div style={{fontSize:17, fontWeight:700, color:T.text}}>{user?.name}</div><div style={{fontSize:13, color:T.textSub}}>{user?.email}</div></div>
            </div>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10}}>
              <div style={{textAlign:"center", padding:14, background:T.bg, borderRadius:12}}><div style={{fontSize:20, fontWeight:800, color:T.accent}}>{diaries.length}</div><div style={{fontSize:11, color:T.textSub, marginTop:2}}>기록한 하루</div></div>
              <div style={{textAlign:"center", padding:14, background:T.bg, borderRadius:12}}><div style={{fontSize:20, fontWeight:800, color:T.accent}}>{streak}</div><div style={{fontSize:11, color:T.textSub, marginTop:2}}>연속 기록</div></div>
              <div style={{textAlign:"center", padding:14, background:T.bg, borderRadius:12}}><div style={{fontSize:20, fontWeight:800, color:T.accent}}>{photoCount}</div><div style={{fontSize:11, color:T.textSub, marginTop:2}}>사진 기록</div></div>
            </div>
          </div>

          <div style={{background:T.card, borderRadius:16, padding:"16px 20px", marginBottom:12, boxShadow:T.shadow}}>
            <div style={{fontSize:14, fontWeight:700, color:T.text, marginBottom:12}}>약관 및 정책</div>
            <button onClick={()=>setShowLegal("terms")} style={{width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 0", border:"none", background:"none", cursor:"pointer", borderBottom:`1px solid ${T.border}`}}>
              <span style={{fontSize:14, color:T.text}}>이용약관</span>
              <span style={{fontSize:13, color:T.textSub}}>→</span>
            </button>
            <button onClick={()=>setShowLegal("privacy")} style={{width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 0", border:"none", background:"none", cursor:"pointer"}}>
              <span style={{fontSize:14, color:T.text}}>개인정보처리방침</span>
              <span style={{fontSize:13, color:T.textSub}}>→</span>
            </button>
          </div>

          <div style={{background:T.card, borderRadius:16, padding:"16px 20px", marginBottom:12, boxShadow:T.shadow}}>
            <div style={{fontSize:14, fontWeight:700, color:T.text, marginBottom:12}}>내 데이터</div>
            <button onClick={handleExportExcel} disabled={exporting} style={{width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 0", border:"none", background:"none", cursor:"pointer", opacity:exporting?0.6:1}}>
              <div style={{display:"flex", alignItems:"center", gap:10}}>
                <span style={{fontSize:18}}>📥</span>
                <div style={{textAlign:"left"}}>
                  <div style={{fontSize:14, color:T.text, fontWeight:600}}>{exporting ? "내보내는 중..." : "엑셀로 내보내기"}</div>
                  <div style={{fontSize:11, color:T.textSub}}>일기 · 프로필 전체 다운로드</div>
                </div>
              </div>
              <span style={{fontSize:13, color:T.textSub}}>→</span>
            </button>
          </div>

          <div style={{background:T.card, borderRadius:16, padding:"16px 20px", marginBottom:12, boxShadow:T.shadow}}>
            <button onClick={()=>{window.location.href="mailto:diary.gyeol@gmail.com?subject=[GYEOL 문의]&body=안녕하세요, GYEOL 앱 관련 문의드립니다.%0A%0A문의 내용:%0A";}} style={{width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 0", border:"none", background:"none", cursor:"pointer"}}>
              <div style={{display:"flex", alignItems:"center", gap:10}}>
                <span style={{fontSize:18}}>📩</span>
                <div style={{textAlign:"left"}}>
                  <div style={{fontSize:14, color:T.text, fontWeight:600}}>문의하기</div>
                  <div style={{fontSize:11, color:T.textSub}}>diary.gyeol@gmail.com</div>
                </div>
              </div>
              <span style={{fontSize:13, color:T.textSub}}>→</span>
            </button>
          </div>

          <button onClick={handleLogout} disabled={loggingOut} style={{width:"100%", padding:15, borderRadius:12, border:`1px solid ${T.danger}`, background:"transparent", color:T.danger, fontSize:15, fontWeight:600, cursor:"pointer", minHeight:52, opacity:loggingOut?0.7:1}}>{loggingOut?"로그아웃 중...":"로그아웃"}</button>

          <div style={{textAlign:"center", marginTop:20, fontSize:11, color:T.textSub, lineHeight:1.8}}>
            <div>© 2026 GYEOL. All rights reserved.</div>
          </div>
        </div>
      );
    }

    // ========================================================
    // 🏠 MainApp — 앱의 메인 화면 (로그인 후 보이는 화면)
    // 하단 탭 네비게이션: 일기 / 응모 / 연대 / 나의 결 / 마이
    // 상단 헤더: GYEOL 로고 + 검색 + 연속기록 + 응모권
    // 각 탭을 누르면 해당 화면으로 전환
    // ========================================================
    function MainApp() {
      const {user} = useAuth(); // 현재 로그인한 사용자 정보
      const [diaries, setDiaries] = useState([]); // 사용자의 모든 일기 목록
      const [dbLoading, setDbLoading] = useState(true); // DB에서 일기 불러오는 중 여부
      const [mainTab, setMainTab] = useState(() => { // 현재 선택된 탭 (URL 해시 기반)
        const hash = window.location.hash.slice(1);
        return ["diary","raffle","community","stats","mypage"].includes(hash) ? hash : "diary";
      });
      const [ticketCount, setTicketCount] = useState(0); // 보유 응모권 수
      const [selected, setSelected] = useState(null); // 선택한 일기 (상세보기용)
      const [writing, setWriting] = useState(false); // 일기 작성 화면 열림 여부
      const [showAI, setShowAI] = useState(false); // AI 채팅 모달 열림 여부
      const [savedToast, setSavedToast] = useState(false); // "저장 완료" 토스트 메시지 표시
      const [showEditConfirm, setShowEditConfirm] = useState(false); // "이미 작성했는데 수정할까요?" 확인 팝업
      const [aiDiary, setAiDiary] = useState(null); // AI 분석할 일기 (분석 모달용)
      const [showFloatingBtn, setShowFloatingBtn] = useState(false); // 스크롤 시 상단 플로팅 기록 버튼 표시
      const [searchQuery, setSearchQuery] = useState(""); // 검색어
      const [showSearch, setShowSearch] = useState(false); // 검색바 표시 여부
      const [showSurveyPopup, setShowSurveyPopup] = useState(false); // 첫 일기 작성 후 설문 팝업
      const [viewMonth, setViewMonth] = useState(() => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; });
      const [calView, setCalView] = useState("일");
      const recordBtnRef = useRef(null);
      const scrollRef = useRef(null);

      // 스크롤 시 기록 버튼이 화면 밖이면 플로팅 버튼 표시
      useEffect(() => {
        const el = scrollRef.current;
        if (!el) return;
        const onScroll = () => {
          if (recordBtnRef.current) {
            const rect = recordBtnRef.current.getBoundingClientRect();
            setShowFloatingBtn(rect.bottom < 0);
          }
        };
        el.addEventListener("scroll", onScroll, {passive:true});
        return () => el.removeEventListener("scroll", onScroll);
      }, [mainTab]);

      // URL 해시 기반 탭 라우팅 (새로고침 시 현재 탭 유지)
      useEffect(() => { window.location.hash = mainTab; }, [mainTab]);
      useEffect(() => {
        const onHashChange = () => {
          const hash = window.location.hash.slice(1);
          if (["diary","raffle","community","stats","mypage"].includes(hash)) setMainTab(hash);
        };
        window.addEventListener("hashchange", onHashChange);
        return () => window.removeEventListener("hashchange", onHashChange);
      }, []);

      // AI 분석 결과 저장 후 로컬 state 업데이트 (재로드 없이)
      const handleAnalysisSaved = useCallback((diaryId, text) => {
        setDiaries(prev => prev.map(d => d.id === diaryId ? { ...d, ai_analysis: text } : d));
      }, []);

      const loadDiaries = useCallback(async () => {
        setDbLoading(true);
        const { data, error } = await sb.from('diary_entries').select('*').eq('user_id', user.id).order('date', { ascending: false });
        if (data) setDiaries(data);
        if (error) console.error('일기 로드 오류:', error);
        // 티켓 카운트 로드
        const { data: profile } = await sb.from('user_profiles').select('ticket_count').eq('user_id', user.id).single();
        if (profile) setTicketCount(profile.ticket_count || 0);
        setDbLoading(false);
      }, [user]);

      useEffect(() => { if (user) loadDiaries(); }, [user]);

      const todayWritten = diaries.some(d=>d.date===today());
      const hasDraft = (() => { try { return !!localStorage.getItem(`gyeol_draft_${today()}`); } catch(e) { return false; } })();
      const streak = (() => {
        let s=0; const d=new Date(); const start=todayWritten?0:1;
        for(let i=start;i<365;i++){const ds=new Date(d); ds.setDate(ds.getDate()-i); const key=ds.toISOString().slice(0,10); if(diaries.some(x=>x.date===key)) s++; else break;}
        return s;
      })();
      const filtered = diaries.filter(d=>{
        if(searchQuery.trim()) {
          const q = searchQuery.trim().toLowerCase();
          const words = q.split(/\s+/);
          const haystack = [
            d.title, d.content,
            ...(d.emotions||[]).map(e=>EMOTIONS[e.key]?.label||""),
          ].join(" ").toLowerCase();
          if (!words.every(w => haystack.includes(w))) return false;
        }
        return true;
      });

      // ===== 일기 저장 처리 함수 =====
      // 오늘 이미 쓴 일기가 있으면 수정(update), 없으면 새로 생성(insert)
      // 새 일기 생성 시 응모권 1개 자동 지급
      // 첫 일기 작성 시 설문 팝업 표시
      const handleSaveDiary = async (data) => {
        const existing = diaries.find(d=>d.date===today());
        if (existing) {
          const { error } = await sb.from('diary_entries').update(data).eq('id', existing.id);
          if (!error) setDiaries(diaries.map(d=>d.date===today()?{...d,...data}:d));
          else { console.error(error); alert("저장 중 오류가 발생했습니다."); return; }
        } else {
          const { data: newEntry, error } = await sb.from('diary_entries').insert({ ...data, user_id: user.id }).select().single();
          if (newEntry) {
            setDiaries([newEntry, ...diaries]);
            // 🎟️ 새 일기 작성 시 응모권 1개 지급 + 이메일 저장 (당첨자 표시용)
            const { data: prof } = await sb.from('user_profiles').select('id, ticket_count').eq('user_id', user.id).single();
            if (prof) {
              const newCount = (prof.ticket_count || 0) + 1;
              await sb.from('user_profiles').update({ ticket_count: newCount, email: user.email }).eq('user_id', user.id);
              setTicketCount(newCount);
            } else {
              await sb.from('user_profiles').insert({ user_id: user.id, ticket_count: 1, display_name: user.name, email: user.email });
              setTicketCount(1);
            }
          }
          else { console.error(error); alert("저장 중 오류가 발생했습니다."); return; }
        }
        // 첫 일기 작성 시 설문 팝업 표시
        const isFirstDiary = diaries.length === 0 && !existing;
        setWriting(false);
        setSavedToast(true); setTimeout(()=>setSavedToast(false), 2200);
        if (isFirstDiary) setTimeout(() => setShowSurveyPopup(true), 800);
      };

      // 하단 탭 메뉴 목록
      const tabs = [{id:"diary",label:"일기",icon:"📝"},{id:"raffle",label:"응모",icon:"🎟️"},{id:"community",label:"연대",icon:"🔗"},{id:"stats",label:"나의 결",icon:"✨"},{id:"mypage",label:"마이",icon:"👤"}];

      if (writing) return (<DiaryWritePage onSave={handleSaveDiary} onCancel={()=>setWriting(false)} editData={todayWritten?diaries.find(d=>d.date===today()):null}/>);
      if (selected) return <DiaryDetail diary={selected} onBack={()=>setSelected(null)}/>;

      return (
        <div style={{position:"fixed", inset:0, display:"flex", flexDirection:"column", background:T.bg, fontFamily:"'Noto Sans KR',sans-serif"}}>
          <div style={{ background:T.card, borderBottom:`1px solid ${T.border}`, padding:"0 20px", paddingTop:`calc(env(safe-area-inset-top,0px) + 10px)`, paddingBottom:10, display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0 }}>
            <span style={{fontSize:17, fontWeight:800, color:T.accent, letterSpacing:3}}>GYEOL</span>
            <div style={{display:"flex", gap:6, alignItems:"center", flexShrink:0}}>
              {mainTab==="diary" && (
                <button onClick={()=>setShowSearch(s=>!s)} style={{background:showSearch?T.accentBg:T.bg, border:`1px solid ${showSearch?T.accent:T.border}`, borderRadius:10, padding:"6px 10px", fontSize:13, color:showSearch?T.accent:T.text, cursor:"pointer", minHeight:32}}>🔍</button>
              )}
              {streak>0 && (<div style={{background:T.accent, borderRadius:10, padding:"5px 9px", fontSize:11, color:"#fff", fontWeight:700, whiteSpace:"nowrap"}}>🔥 {streak}일</div>)}
              {ticketCount>0 && (<div style={{background:"linear-gradient(135deg,#FFD700,#FFA500)", borderRadius:10, padding:"5px 9px", fontSize:11, color:"#4A3728", fontWeight:700, whiteSpace:"nowrap"}}>🎟️ {ticketCount}</div>)}
            </div>
          </div>

          {/* 검색바 */}
          {showSearch && mainTab==="diary" && (
            <div style={{background:T.card, borderBottom:`1px solid ${T.border}`, padding:"8px 16px", flexShrink:0, animation:"fadeIn 0.2s ease"}}>
              <div style={{display:"flex", alignItems:"center", background:T.input, borderRadius:12, border:`1.5px solid ${T.border}`, padding:"0 14px"}}>
                <span style={{fontSize:14, color:T.textSub, marginRight:8}}>🔍</span>
                <input value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}
                  placeholder="제목, 내용, 감정으로 검색..."
                  autoFocus
                  style={{flex:1, border:"none", background:"transparent", outline:"none", fontSize:14, color:T.text, padding:"11px 0", fontFamily:"inherit"}}/>
                {searchQuery && (
                  <button onClick={()=>setSearchQuery("")}
                    style={{background:"none", border:"none", fontSize:14, color:T.textSub, cursor:"pointer", padding:4}}>✕</button>
                )}
              </div>
            </div>
          )}

          <div ref={scrollRef} style={{flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch"}}>
            {mainTab==="diary" && (
              <div style={{padding:"16px 16px 12px"}}>
                {dbLoading ? (<div style={{textAlign:"center", padding:40, color:T.textSub}}><div style={{fontSize:14}}>일기를 불러오는 중...</div></div>) : (<>
                  <WeeklyAISummary diaries={diaries}/>
                  {/* 기록 버튼 + 드래프트 */}
                  {hasDraft && (
                    <div onClick={()=>setWriting(true)} style={{background:`linear-gradient(135deg, ${T.card}, ${T.accentBg})`, borderRadius:14, padding:"16px 18px", marginBottom:10, border:`1.5px dashed ${T.accent}`, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"space-between", boxShadow:T.shadow, animation:"fadeIn 0.3s ease"}}>
                      <div><div style={{fontSize:14, fontWeight:700, color:T.accent, marginBottom:3}}>📝 작성중인 일기가 있어요</div><div style={{fontSize:12, color:T.textSub}}>탭하여 이어서 작성하기</div></div>
                      <div style={{fontSize:12, fontWeight:600, color:"#fff", padding:"6px 14px", background:T.accent, borderRadius:10}}>이어쓰기</div>
                    </div>
                  )}
                  <button ref={recordBtnRef} onClick={()=>{if(!hasDraft&&todayWritten) setShowEditConfirm(true); else setWriting(true);}}
                    style={{width:"100%", padding:16, borderRadius:14, border:"none", background:(hasDraft||!todayWritten)?T.gradient:T.border, color:(hasDraft||!todayWritten)?"#fff":T.textSub, fontSize:15, fontWeight:700, cursor:"pointer", marginBottom:16, minHeight:52, boxShadow:(hasDraft||!todayWritten)?`0 4px 16px ${T.accent}44`:"none", display:"flex", alignItems:"center", justifyContent:"center", gap:6}}>
                    <span style={{fontSize:18}}>✏️</span>{hasDraft?"작성중인 일기 이어쓰기":todayWritten?"오늘 일기 수정하기":"오늘 하루 기록하기"}
                  </button>

                  {/* 월 네비게이션 + 뷰모드 탭 */}
                  <MonthNavigator viewMonth={viewMonth} setViewMonth={setViewMonth} calView={calView} setCalView={setCalView}/>

                  {/* 뷰 전환 */}
                  {calView==="일" ? (
                    <DailyCalendarView diaries={searchQuery?filtered:diaries} viewMonth={viewMonth} onSelect={setSelected} onAI={setAiDiary}/>
                  ) : (
                    <MonthlyCalendarView diaries={diaries} viewMonth={viewMonth} onSelect={setSelected}/>
                  )}
                </>)}
              </div>
            )}
            {mainTab==="raffle" && <RaffleTab ticketCount={ticketCount} onTicketChange={setTicketCount} />}
            {mainTab==="stats" && <StatsTab diaries={diaries} onOpenAI={()=>setShowAI(true)}/>}
            {mainTab==="mypage" && <MyPage diaries={diaries} streak={streak}/>}
            {mainTab==="community" && <CommunityTab diaries={diaries} />}
          </div>

          <div style={{background:T.card, borderTop:`1px solid ${T.border}`, display:"flex", paddingBottom:`env(safe-area-inset-bottom,0px)`, flexShrink:0}}>
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setMainTab(t.id)} style={{flex:1, display:"flex", flexDirection:"column", alignItems:"center", padding:"10px 0", border:"none", background:"none", cursor:"pointer", color:mainTab===t.id?T.accent:T.textSub, minHeight:56}}>
                <span style={{fontSize:22, marginBottom:2}}>{t.icon}</span>
                <span style={{fontSize:10, fontWeight:mainTab===t.id?700:500}}>{t.label}</span>
                {mainTab===t.id&&<div style={{width:4, height:4, borderRadius:"50%", background:T.accent, marginTop:3}}/>}
              </button>
            ))}
          </div>

          {showAI && <AIChatModal onClose={()=>setShowAI(false)} diaries={diaries}/>}
          {aiDiary && <DiaryAIModal diary={aiDiary} onClose={()=>setAiDiary(null)} onAnalysisSaved={handleAnalysisSaved}/>}

          {showEditConfirm && (
            <div style={{position:"fixed", inset:0, background:"rgba(74,55,40,0.5)", zIndex:200, display:"flex", flexDirection:"column", justifyContent:"flex-end"}} onClick={()=>setShowEditConfirm(false)}>
              <div onClick={e=>e.stopPropagation()} style={{background:T.card, borderRadius:"20px 20px 0 0", padding:"24px 20px", paddingBottom:`calc(env(safe-area-inset-bottom,0px) + 24px)`, textAlign:"center"}}>
                <div style={{width:36, height:4, borderRadius:2, background:T.border, margin:"0 auto 20px"}}/>
                <div style={{fontSize:36, marginBottom:10}}>✏️</div>
                <div style={{fontSize:16, fontWeight:700, color:T.text, marginBottom:6}}>오늘 일기를 이미 작성했어요</div>
                <div style={{fontSize:14, color:T.textSub, marginBottom:20, lineHeight:1.6}}>수정하시겠어요?</div>
                <div style={{display:"flex", gap:10}}>
                  <button onClick={()=>setShowEditConfirm(false)} style={{flex:1, padding:15, borderRadius:12, border:`1px solid ${T.border}`, background:T.card, fontSize:15, fontWeight:600, color:T.textSub, cursor:"pointer", minHeight:50}}>취소</button>
                  <button onClick={()=>{setShowEditConfirm(false);setWriting(true);}} style={{flex:1, padding:15, borderRadius:12, border:"none", background:T.accent, color:"#fff", fontSize:15, fontWeight:700, cursor:"pointer", minHeight:50}}>수정하기</button>
                </div>
              </div>
            </div>
          )}

          {/* 플로팅 기록 버튼 */}
          {showFloatingBtn && mainTab==="diary" && (
            <button onClick={()=>{if(!hasDraft&&todayWritten) setShowEditConfirm(true); else setWriting(true);}}
              style={{position:"fixed", top:`calc(env(safe-area-inset-top,0px) + 60px)`, left:"50%", transform:"translateX(-50%)", padding:"12px 28px", borderRadius:30, border:"none", background:(hasDraft||!todayWritten)?T.accent:"rgba(232,223,208,0.95)", color:(hasDraft||!todayWritten)?"#fff":T.textSub, fontSize:14, fontWeight:700, cursor:"pointer", zIndex:90, boxShadow:"0 4px 20px rgba(0,0,0,0.15)", display:"flex", alignItems:"center", gap:6, animation:"slideUp 0.25s ease", backdropFilter:"blur(10px)", WebkitBackdropFilter:"blur(10px)"}}>
              <span style={{fontSize:16}}>✏️</span>{hasDraft?"작성중인 일기 이어쓰기":todayWritten?"오늘 일기 수정하기":"오늘 하루 기록하기"}
            </button>
          )}

          {savedToast && (
            <div style={{position:"fixed", bottom:`calc(env(safe-area-inset-bottom,0px) + 72px)`, left:"50%", transform:"translateX(-50%)", background:T.accent, color:"#fff", padding:"13px 28px", borderRadius:14, fontSize:14, fontWeight:600, boxShadow:`0 8px 32px ${T.accent}66`, zIndex:2000, whiteSpace:"nowrap", animation:"slideUp 0.3s ease"}}>
              ✨ 오늘의 결이 저장되었어요
            </div>
          )}
          {showSurveyPopup && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", zIndex:3000, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
              <div style={{ background:T.card, borderRadius:20, padding:"30px 24px", maxWidth:360, width:"100%", textAlign:"center", position:"relative", animation:"slideUp 0.4s ease" }}>
                <button onClick={()=>setShowSurveyPopup(false)} style={{ position:"absolute", top:14, right:14, background:"none", border:"none", fontSize:20, color:T.textSub, cursor:"pointer", padding:4, lineHeight:1 }}>✕</button>
                <div style={{ fontSize:48, marginBottom:16 }}>📝</div>
                <div style={{ fontSize:18, fontWeight:800, color:T.text, marginBottom:12 }}>첫 일기를 축하해요!</div>
                <div style={{ fontSize:14, color:T.textSub, lineHeight:1.8, marginBottom:24, wordBreak:"keep-all" }}>
                  첫 일기를 작성해주셔서 감사합니다.<br/>고객님의 경험을 짧게 나눠주세요.<br/>제품을 개선하는데 큰 도움이 됩니다.
                </div>
                <a href="https://forms.gle/jYtGvJwaKq21vZie9" target="_blank" rel="noopener noreferrer" onClick={()=>setShowSurveyPopup(false)} style={{ display:"block", width:"100%", padding:16, borderRadius:14, border:"none", background:T.gradient, color:"#fff", fontSize:16, fontWeight:700, cursor:"pointer", textDecoration:"none", minHeight:52, lineHeight:"20px" }}>설문하러 가기</a>
                <button onClick={()=>setShowSurveyPopup(false)} style={{ marginTop:10, background:"none", border:"none", fontSize:13, color:T.textSub, cursor:"pointer" }}>다음에 할게요</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ========================================================
    // 🚦 AuthRouter — 로그인 여부에 따라 화면 분기
    // 로그인 됨 → MainApp(메인 화면) 표시
    // 로그인 안 됨 → LoginPage(로그인 화면) 표시
    // ========================================================
    function AuthRouter() {
      const {user, loading} = useAuth();
      if (loading) return <LoadingScreen text="나의 결을 발견하는 중..."/>;
      return user ? <MainApp/> : <LoginPage/>;
    }

    // ===== 앱 시작점 — 모든 것을 조합하여 화면에 렌더링 =====
    function App() { return <AuthProvider><AuthRouter/></AuthProvider>; }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
