    const photoUrlCache = {};
    async function getPhotoUrl(photoRef) {
      if (!photoRef) return null;
      // 이미 full URL(기존 데이터)이면 signed URL로 변환 시도
      const path = photoRef.startsWith('http')
        ? photoRef.split('/storage/v1/object/public/diary-photos/')[1] || null
        : photoRef;
      if (!path) return photoRef; // 파싱 불가 시 원본 반환
      if (photoUrlCache[path]) return photoUrlCache[path];
      const { data, error } = await sb.storage.from('diary-photos').createSignedUrl(path, 3600); // 1시간
      if (error) { console.error('Signed URL 오류:', error); return null; }
      photoUrlCache[path] = data.signedUrl;
      return data.signedUrl;
    }

              "Content-Type": "application/json",

        }
        return data.text || "분석을 가져올 수 없었어요.";

    function AuthProvider({children}) {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      useEffect(() => {
        sb.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user ?? null); setLoading(false);
        });
        const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
          setUser(session?.user ?? null); setLoading(false);
        });
        return () => subscription.unsubscribe();
      }, []);
      const login = async (provider, email, pw) => {
        setLoading(true); let errMsg = null;
        if (provider === 'email') {
          const { error } = await sb.auth.signInWithPassword({ email, password: pw });
          if (error) errMsg = error.message === 'Invalid login credentials' ? '이메일 또는 비밀번호가 올바르지 않습니다.' : error.message;
        } else {
          const redirectTo = window.location.origin + window.location.pathname;
          const { error } = await sb.auth.signInWithOAuth({ provider, options: { redirectTo } });
          if (error) errMsg = error.message;
        }
        setLoading(false); return errMsg;
      };
      const signup = async (email, pw, name) => {
        const { error } = await sb.auth.signUp({ email, password: pw, options: { data: { name } } });
        if (error) return error.message === 'User already registered' ? '이미 가입된 이메일입니다.' : error.message;

      return (

          {children}
        </AuthCtx.Provider>
      );
    }

    function DiaryWritePage({onSave, onCancel, editData}) {
      const {user} = useAuth();
      const DRAFT_KEY = `gyeol_draft_${today()}`;
      const _draft = (() => { try { const s = localStorage.getItem(DRAFT_KEY); return s ? JSON.parse(s) : null; } catch(e) { return null; } })();
      const _init = _draft || editData;
      const [title, setTitle] = useState(_init?.title||"");
      const [content, setContent] = useState(_init?.content||"");
      const [selEmotions, setSelEmotions] = useState(_init?.emotions||[]);
      const [selActivities, setSelActivities] = useState(_init?.activities||[]);
      const [places, setPlaces] = useState(_init?.places||[]);
      const [people, setPeople] = useState(_init?.people||[]);
      const [purchases, setPurchases] = useState(_init?.purchases||[]);
      const [tab, setTab] = useState("emotion");
      const [saving, setSaving] = useState(false);
      const [openEmoGroup, setOpenEmoGroup] = useState(null);
      const [photoFile, setPhotoFile] = useState(null);
      const [photoPreview, setPhotoPreview] = useState(null);
      const [newPlace, setNewPlace] = useState("");
      // 기존 사진(editData) 또는 임시 저장(draft) 사진이 있으면 signed URL로 미리보기 로드
      useEffect(() => {
        const photoPath = editData?.photo_url || _draft?.photo_url;
        if (photoPath) getPhotoUrl(photoPath).then(setPhotoPreview);
      }, []);
      const [newPerson, setNewPerson] = useState("");
      const [newPurchase, setNewPurchase] = useState("");

      // 자동 임시 저장 — 변경될 때마다 localStorage에 백업
      useEffect(() => {
        const hasAny = title || content || selEmotions.length > 0 || selActivities.length > 0 || places.length > 0 || people.length > 0 || purchases.length > 0;
        if (hasAny) {
          localStorage.setItem(DRAFT_KEY, JSON.stringify({ title, content, emotions: selEmotions, activities: selActivities, places, people, purchases, photo_url: photoPreview }));
        }
      }, [title, content, selEmotions, selActivities, places, people, purchases, photoPreview]);

      const toggleEmo = k => {
        const ex = selEmotions.find(e=>e.key===k);
        if (ex) setSelEmotions(selEmotions.filter(e=>e.key!==k));

      const toggleAct = a => setSelActivities(selActivities.includes(a)?selActivities.filter(x=>x!==a):[...selActivities,a]);

      const addPlace = () => {
        const v = newPlace.trim();
        if (!v) return;
        setPlaces(prev => [...prev, { name: v }]);
        setNewPlace("");

      const addPerson = () => {
        const v = newPerson.trim();
        if (!v) return;
        setPeople(prev => [...prev, v]);
        setNewPerson("");

      const addPurchase = () => {
        const v = newPurchase.trim();
        if (!v) return;
        setPurchases(prev => [...prev, v]);
        setNewPurchase("");

      const handleSave = async () => {
        if (!title.trim()||!content.trim()||selEmotions.length===0) {
          alert("제목, 내용, 감정을 모두 입력해주세요."); return;
        }
        setSaving(true);
        let photo_url = !photoPreview ? null : (editData?.photo_url || null); // 미리보기 없으면 사진 삭제, 있으면 기존 경로 유지
        // 새 사진 파일이 있으면 Supabase Storage에 업로드
        if (photoFile) {
          try {
            const ext = photoFile.name.split('.').pop();
            const path = `diary_photos/${user.id}/${today()}_${Date.now()}.${ext}`;
            const { data: upData, error: upErr } = await sb.storage.from('diary-photos').upload(path, photoFile, { upsert: true });
            if (upErr) { console.error("사진 업로드 오류:", upErr); }

              photo_url = path; // private 버킷이므로 경로만 저장, 표시할 때 signed URL 생성

    // ========================================================
    // 📊 WeeklyAISummary — 최근 7일 일기 자동 AI 분석 카드
    // ========================================================
    function WeeklyAISummary({ diaries }) {
      const last7 = diaries.filter(d => {
        const days = Math.floor((new Date() - new Date(d.date + "T00:00:00")) / 86400000);
        return days < 7;
      });
      const cacheKey = `gyeol_weekly_${last7.map(d=>d.date).sort().join(",")}`;
      const [summary, setSummary] = useState(null);
      const [loading, setLoading] = useState(false);
      const [expanded, setExpanded] = useState(false);

      // cacheKey가 바뀔 때만 실행 — 캐시 있으면 바로 표시, 없으면 API 호출
      useEffect(() => {
        if (last7.length === 0) return;
        try {
          const hit = localStorage.getItem(cacheKey);
          if (hit) { setSummary(hit); setExpanded(true); return; }
        } catch {}
        // 캐시 없으면 생성
        setSummary(null);
        (async () => {
          setLoading(true); setExpanded(true);
          const ctx = last7.map(d =>
            `[${d.date}] 감정: ${(d.emotions||[]).map(e=>`${EMOTIONS[e.key]?.label}(강도${e.intensity})`).join(", ")||"없음"} / 활동: ${(d.activities||[]).join(", ")||"없음"}`
          ).join("\n");
          const prompt = `아래 최근 7일 일기를 따뜻하게 분석해주세요. 전체 5줄 이내로 간결하게.\n\n${ctx}\n\n💜 이번 주 감정 흐름 한 줄\n🏃 많이 한 활동 한 줄\n🌱 한마디 응원 (슬픔·불안이 주를 이루면 전문 상담 부드럽게 제안)`;
          try {
            const text = await callGemini(prompt);
            setSummary(text);

        const places = (d.places||[]).map(p=>p.name).join(", ") || "없음";
        return `[${d.date}]\n제목: ${d.title}\n내용: ${(d.content||"").slice(0,300)}\n감정: ${emos}\n활동: ${acts}\n만난 사람: ${ppl}\n장소: ${places}`;

## 분석 기준:

### E(외향) vs I(내향):
- 사람 언급 빈도 (많으면 E, 적으면 I)
- 사회적 활동 vs 혼자만의 활동
- "우리", "같이" vs "나", "혼자" 표현
- 에너지원: 사람과 만남=E, 혼자 시간=I

### S(감각) vs N(직관):
- 구체적 사실/수치/시간 기술=S vs 추상적/비유적 표현=N
- 순차적 일과 기록=S vs 의미 해석/패턴 발견=N
- 현실적 실용적 주제=S vs 미래/가능성/아이디어=N

### T(사고) vs F(감정):
- 원인-결과 분석적 서술=T vs 감정 중심 서술=F
- 문제 해결 초점=T vs 관계/공감 초점=F
- 감정 표현이 분석적=T vs 풍부하고 상세=F

### J(판단) vs P(인식):
- 계획/목표/일정 언급=J vs 즉흥/탐험/유연성=P
- "해야 한다", "완료했다"=J vs "해볼까", "갑자기"=P
- 체계적 구조=J vs 자유로운 흐름=P

## 중요:
- 일기 작성 자체가 내향적 행동이므로 E 신호가 있으면 가중치를 둘 것
- 한국어 문화적 맥락 고려
- 반드시 아래 JSON 형식으로만 응답:
{"mbti":"XXXX","confidence":{"E_I":"E 또는 I 선택 이유","S_N":"S 또는 N 선택 이유","T_F":"T 또는 F 선택 이유","J_P":"J 또는 P 선택 이유"}}

## 분석할 일기:

${diaryCtx}`;

            }
            return { mbti, confidence: parsed.confidence };
          }
        }
        return null;
      } catch (e) {

        return null;
      }

        if (!user) return;
        (async () => {
          setLoadingProfile(true);
          const { data } = await sb.from('user_profiles').select('mbti, mbti_updated_at').eq('user_id', user.id).single();
          if (data?.mbti) setMbti(data.mbti);
          // 내가 참여한 방 로드
          const { data: members } = await sb.from('mbti_chat_members').select('room_id, mbti_chat_rooms(mbti)').eq('user_id', user.id);
          if (members) setMyRooms(members.map(m => ({ room_id: m.room_id, mbti: m.mbti_chat_rooms?.mbti })));
          setLoadingProfile(false);
        })();
      }, [user]);

      // MBTI별 멤버 수 로드
      useEffect(() => {
        (async () => {
          const { data: rooms } = await sb.from('mbti_chat_rooms').select('id, mbti');
          if (!rooms) return;
          const counts = {};
          for (const room of rooms) {
            const { count } = await sb.from('mbti_chat_members').select('*', { count: 'exact', head: true }).eq('room_id', room.id);
            counts[room.mbti] = count || 0;
          }
          setMemberCounts(counts);
        })();
      }, [myRooms]);

      const handleAnalyze = async () => {
        setAnalyzing(true);
        const result = await analyzeMBTI(diaries, user.id, user.name);
        if (result) {
          setMbti(result.mbti);
          setConfidence(result.confidence);
        } else {
          alert("MBTI 분석에 실패했어요. 일기가 있는지 확인해주세요.");
        }
        setAnalyzing(false);
      };

      const handleJoinRoom = async (mbtiType) => {
        const { data: room } = await sb.from('mbti_chat_rooms').select('id').eq('mbti', mbtiType).single();
        if (!room) return;
        // 이미 참여중인지 확인
        const { data: existing } = await sb.from('mbti_chat_members').select('id').eq('room_id', room.id).eq('user_id', user.id).single();
        if (!existing) {
          await sb.from('mbti_chat_members').insert({ room_id: room.id, user_id: user.id });
        }
        setMyRooms(prev => {
          if (prev.some(r => r.mbti === mbtiType)) return prev;
          return [...prev, { room_id: room.id, mbti: mbtiType }];
        });
        setCurrentRoom({ room_id: room.id, mbti: mbtiType });
      };

      if (currentRoom) {
        return <ChatRoom roomId={currentRoom.room_id} mbti={currentRoom.mbti} onBack={() => setCurrentRoom(null)} />;
      }

      if (loadingProfile) {
        return (
          <div style={{ textAlign: "center", padding: "80px 20px" }}>
            <div style={{ fontSize: 32, marginBottom: 16, animation: "pulse 1.5s infinite" }}>🔗</div>
            <div style={{ fontSize: 14, color: T.textSub }}>연대 정보를 불러오는 중...</div>
          </div>
        );
      }

      // MBTI 분석 전 상태
      if (!mbti) {
        const diaryCount = diaries.length;

        return (
          <div style={{ padding: "30px 16px" }}>
            <div style={{ fontSize: 20, fontWeight: 800, color: T.text, marginBottom: 4 }}>연대</div>
            <div style={{ fontSize: 13, color: T.textSub, marginBottom: 20 }}>결이 맞는 사람들과 연결되세요</div>

            <div style={{ background: T.card, borderRadius: 16, padding: 24, boxShadow: T.shadow, textAlign: "center" }}>
              <div style={{ fontSize: 48, marginBottom: 16 }}>🧠</div>
              <div style={{ fontSize: 17, fontWeight: 700, color: T.text, marginBottom: 8 }}>나의 MBTI를 알아보세요</div>
              <div style={{ fontSize: 14, color: T.textSub, lineHeight: 1.8, marginBottom: 20 }}>
                작성한 일기를 AI가 분석하여<br />당신의 MBTI 성격유형을 추측합니다.
              </div>
              <div style={{ fontSize: 13, color: T.accent, fontWeight: 600, marginBottom: 20, padding: "10px 16px", background: T.accentBg, borderRadius: 12 }}>
                작성한 일기: {diaryCount}개 {diaryCount === 0 && "— 일기를 먼저 작성해주세요"}
              </div>
              <button onClick={handleAnalyze} disabled={analyzing || diaryCount === 0}
                style={{ width: "100%", padding: 16, borderRadius: 14, border: "none", background: diaryCount > 0 ? T.gradient : T.border, color: diaryCount > 0 ? "#fff" : T.textSub, fontSize: 16, fontWeight: 700, cursor: diaryCount > 0 ? "pointer" : "default", opacity: analyzing ? 0.7 : 1, minHeight: 52 }}>
                {analyzing ? "🤖 AI가 분석 중..." : "나의 결 유형 분석하기"}
              </button>
            </div>
          </div>
        );
      }

      // MBTI 확인된 상태 — 방 목록
      const MBTI_DESCRIPTIONS = {
        INTJ: "전략가", INTP: "논리술사", ENTJ: "통솔자", ENTP: "변론가",
        INFJ: "옹호자", INFP: "중재자", ENFJ: "선도자", ENFP: "활동가",
        ISTJ: "현실주의자", ISTP: "장인", ESTJ: "경영자", ESTP: "사업가",
        ISFJ: "수호자", ISFP: "모험가", ESFJ: "집정관", ESFP: "연예인",
      };
      const MBTI_GROUPS = [
        { label: "분석가형", types: ["INTJ", "INTP", "ENTJ", "ENTP"], color: "#9B59B6" },
        { label: "외교관형", types: ["INFJ", "INFP", "ENFJ", "ENFP"], color: "#2ECC71" },
        { label: "관리자형", types: ["ISTJ", "ISTP", "ESTJ", "ESTP"], color: "#3498DB" },
        { label: "탐험가형", types: ["ISFJ", "ISFP", "ESFJ", "ESFP"], color: "#E67E22" },
      ];

      return (
        <div style={{ padding: "20px 16px", paddingBottom: 20 }}>
          <div style={{ fontSize: 20, fontWeight: 800, color: T.text, marginBottom: 4 }}>연대</div>
          <div style={{ fontSize: 13, color: T.textSub, marginBottom: 16 }}>결이 맞는 사람들과 연결되세요</div>

          {/* 내 MBTI 카드 */}
          <div style={{ background: "linear-gradient(135deg,#4A3728,#7A5C44)", borderRadius: 16, padding: "20px", marginBottom: 16, color: "#fff", boxShadow: "0 4px 20px rgba(74,55,40,0.3)" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div>
                <div style={{ fontSize: 12, opacity: 0.75, marginBottom: 4 }}>나의 결 유형</div>
                <div style={{ fontSize: 28, fontWeight: 800, letterSpacing: 4 }}>{mbti}</div>
                <div style={{ fontSize: 14, opacity: 0.9, marginTop: 4 }}>{MBTI_DESCRIPTIONS[mbti] || ""}</div>
              </div>
              <button onClick={handleAnalyze} disabled={analyzing}
                style={{ background: "rgba(255,255,255,0.2)", border: "none", borderRadius: 10, padding: "8px 14px", color: "#fff", fontSize: 12, fontWeight: 600, cursor: "pointer", minHeight: 36 }}>
                {analyzing ? "분석 중..." : "재분석"}
              </button>
            </div>
            {confidence && (
              <div style={{ marginTop: 14, paddingTop: 14, borderTop: "1px solid rgba(255,255,255,0.2)", fontSize: 12, lineHeight: 1.8, opacity: 0.85 }}>
                {Object.entries(confidence).map(([k, v]) => (
                  <div key={k}><span style={{ fontWeight: 700 }}>{k}:</span> {v}</div>
                ))}
              </div>
            )}
          </div>

          {/* 내 MBTI 방 바로가기 */}
          <div style={{ background: T.card, borderRadius: 16, padding: "16px 18px", marginBottom: 16, boxShadow: T.shadow, border: `2px solid ${T.accent}` }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div>
                <div style={{ fontSize: 15, fontWeight: 700, color: T.text }}>💬 {mbti} 방</div>
                <div style={{ fontSize: 12, color: T.textSub, marginTop: 2 }}>나와 같은 결의 사람들 · {memberCounts[mbti] || 0}명</div>
              </div>
              <button onClick={() => handleJoinRoom(mbti)}
                style={{ padding: "10px 20px", borderRadius: 12, border: "none", background: T.gradient, color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer", minHeight: 42 }}>
                입장하기
              </button>
            </div>
          </div>

          {/* 참여중인 방 */}
          {myRooms.length > 0 && (
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: T.text, marginBottom: 10 }}>참여 중인 방</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {myRooms.map(r => (
                  <div key={r.room_id} onClick={() => setCurrentRoom(r)}
                    style={{ background: T.card, borderRadius: 14, padding: "14px 18px", boxShadow: T.shadow, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <div style={{ width: 40, height: 40, borderRadius: 12, background: T.accentBg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 800, color: T.accent }}>{r.mbti}</div>
                      <div>
                        <div style={{ fontSize: 14, fontWeight: 600, color: T.text }}>{r.mbti} · {MBTI_DESCRIPTIONS[r.mbti] || ""}</div>
                        <div style={{ fontSize: 11, color: T.textSub }}>{memberCounts[r.mbti] || 0}명 참여 중</div>
                      </div>
                    </div>
                    <span style={{ fontSize: 13, color: T.textSub }}>→</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* 전체 MBTI 방 목록 */}
          <div style={{ fontSize: 14, fontWeight: 700, color: T.text, marginBottom: 10 }}>전체 유형별 방</div>
          {MBTI_GROUPS.map(group => (
            <div key={group.label} style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: group.color, marginBottom: 8, padding: "4px 0" }}>{group.label}</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                {group.types.map(type => {
                  const isMine = type === mbti;
                  const isJoined = myRooms.some(r => r.mbti === type);
                  return (
                    <div key={type} onClick={() => handleJoinRoom(type)}
                      style={{ background: isMine ? T.accentBg : T.card, borderRadius: 12, padding: "12px 14px", boxShadow: T.shadow, cursor: "pointer", border: isMine ? `2px solid ${T.accent}` : `1px solid ${T.border}` }}>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                        <div style={{ fontSize: 15, fontWeight: 700, color: isMine ? T.accent : T.text }}>{type}</div>
                        {isMine && <span style={{ fontSize: 10, background: T.accent, color: "#fff", padding: "2px 8px", borderRadius: 8, fontWeight: 700 }}>ME</span>}
                        {isJoined && !isMine && <span style={{ fontSize: 10, background: T.success, color: "#fff", padding: "2px 8px", borderRadius: 8, fontWeight: 700 }}>참여중</span>}
                      </div>
                      <div style={{ fontSize: 11, color: T.textSub, marginTop: 2 }}>{MBTI_DESCRIPTIONS[type]}</div>
                      <div style={{ fontSize: 10, color: T.textMuted, marginTop: 4 }}>{memberCounts[type] || 0}명</div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ========================================================
    // 💬 ChatRoom — MBTI 채팅방
    // ========================================================
    function ChatRoom({ roomId, mbti, onBack }) {
      const { user } = useAuth();
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(true);
      const [sending, setSending] = useState(false);
      const [members, setMembers] = useState([]);
      const [showLeaveConfirm, setShowLeaveConfirm] = useState(false);
      const messagesEndRef = useRef(null);
      const scrollContainerRef = useRef(null);

      const ROOM_DESC = "이 방은 가장 당신과 잘 어울리는 결이 맞는 사람들이 연결된 방입니다. 편하게 소통하세요";

      // 메시지 로드
      const loadMessages = useCallback(async () => {
        const { data } = await sb.from('mbti_chat_messages')
          .select('*')
          .eq('room_id', roomId)
          .order('created_at', { ascending: true })
          .limit(200);
        if (data) setMessages(data);
        setLoading(false);
      }, [roomId]);

      // 멤버 로드
      const loadMembers = useCallback(async () => {
        const { data } = await sb.from('mbti_chat_members')
          .select('user_id, joined_at')
          .eq('room_id', roomId);
        if (data) setMembers(data);
      }, [roomId]);

      useEffect(() => {
        loadMessages();
        loadMembers();
        // 30초마다 새 메시지 폴링 (실시간 불필요)
        const interval = setInterval(() => {
          loadMessages();
        }, 30000);
        return () => clearInterval(interval);
      }, [loadMessages, loadMembers]);

      // 스크롤 하단으로
      useEffect(() => {
        if (messagesEndRef.current) {
          messagesEndRef.current.scrollIntoView({ behavior: "smooth" });
        }
      }, [messages]);

      const handleSend = async () => {
        const text = input.trim();
        if (!text || sending) return;
        setSending(true);
        setInput("");
        const newMsg = {
          room_id: roomId,
          user_id: user.id,
          content: text,
          display_name: user.name,
        };
        // 즉시 로컬에 추가 (낙관적 업데이트)
        const tempMsg = { ...newMsg, id: 'temp-' + Date.now(), created_at: new Date().toISOString() };
        setMessages(prev => [...prev, tempMsg]);

        const { error } = await sb.from('mbti_chat_messages').insert(newMsg);
        if (error) {
          console.error("메시지 전송 오류:", error);
          setMessages(prev => prev.filter(m => m.id !== tempMsg.id));
          setInput(text);
        } else {
          // 서버에서 다시 로드하여 정확한 데이터 반영
          await loadMessages();
        }
        setSending(false);
      };

      const handleLeave = async () => {
        await sb.from('mbti_chat_members').delete().eq('room_id', roomId).eq('user_id', user.id);
        onBack();
      };

      const fmtTime = (iso) => {
        const d = new Date(iso);
        const h = d.getHours();
        const m = String(d.getMinutes()).padStart(2, "0");
        const ampm = h >= 12 ? "오후" : "오전";
        const h12 = h % 12 || 12;
        return `${ampm} ${h12}:${m}`;
      };
      const fmtDate = (iso) => {
        const d = new Date(iso);
        return `${d.getMonth() + 1}월 ${d.getDate()}일`;
      };

      // 날짜 구분선을 위한 그룹핑
      let lastDate = "";

      return (
        <div style={{ position: "fixed", inset: 0, background: T.bg, zIndex: 10, display: "flex", flexDirection: "column" }}>
          {/* 헤더 */}
          <div style={{ background: T.card, borderBottom: `1px solid ${T.border}`, padding: "0 16px", paddingTop: `calc(env(safe-area-inset-top,0px) + 10px)`, paddingBottom: 10, display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <button onClick={onBack} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: T.textSub, minWidth: 40, minHeight: 40, display: "flex", alignItems: "center" }}>←</button>
              <div>
                <div style={{ fontSize: 16, fontWeight: 700, color: T.text }}>{mbti} 방</div>
                <div style={{ fontSize: 11, color: T.textSub }}>{members.length}명 참여 중</div>
              </div>
            </div>
            <button onClick={() => setShowLeaveConfirm(true)}
              style={{ background: T.bg, border: `1px solid ${T.border}`, borderRadius: 10, padding: "8px 14px", fontSize: 12, color: T.danger, fontWeight: 600, cursor: "pointer", minHeight: 36 }}>
              나가기
            </button>
          </div>

          {/* 메시지 영역 */}
          <div ref={scrollContainerRef} style={{ flex: 1, overflowY: "auto", WebkitOverflowScrolling: "touch", padding: "16px 14px" }}>
            {/* 방 설명 */}
            <div style={{ textAlign: "center", marginBottom: 20 }}>
              <div style={{ display: "inline-block", background: T.accentBg, borderRadius: 16, padding: "14px 20px", maxWidth: 300 }}>
                <div style={{ fontSize: 13, color: T.text, lineHeight: 1.8, fontWeight: 500 }}>{ROOM_DESC}</div>
              </div>
            </div>

            {loading ? (
              <div style={{ textAlign: "center", padding: 40, color: T.textSub }}>
                <div style={{ fontSize: 14 }}>메시지를 불러오는 중...</div>
              </div>
            ) : messages.length === 0 ? (
              <div style={{ textAlign: "center", padding: 40, color: T.textSub }}>
                <div style={{ fontSize: 32, marginBottom: 12 }}>💬</div>
                <div style={{ fontSize: 14, lineHeight: 1.7 }}>아직 대화가 없어요.<br />첫 메시지를 보내보세요!</div>
              </div>
            ) : (
              messages.map((msg, i) => {
                const isMe = msg.user_id === user.id;
                const msgDate = fmtDate(msg.created_at);
                let showDateLine = false;
                if (msgDate !== lastDate) {
                  showDateLine = true;
                  lastDate = msgDate;
                }
                return (
                  <React.Fragment key={msg.id}>
                    {showDateLine && (
                      <div style={{ textAlign: "center", margin: "16px 0 12px" }}>
                        <span style={{ background: T.border, padding: "4px 14px", borderRadius: 12, fontSize: 11, color: T.textSub, fontWeight: 500 }}>{msgDate}</span>
                      </div>
                    )}
                    <div style={{ display: "flex", flexDirection: isMe ? "row-reverse" : "row", alignItems: "flex-end", gap: 6, marginBottom: 10 }}>
                      {!isMe && (
                        <div style={{ width: 32, height: 32, borderRadius: "50%", background: T.accentBg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, color: T.accent, flexShrink: 0 }}>
                          {(msg.display_name || "?")[0]}
                        </div>
                      )}
                      <div style={{ maxWidth: "70%" }}>
                        {!isMe && <div style={{ fontSize: 11, color: T.textSub, marginBottom: 3, paddingLeft: 4 }}>{msg.display_name}</div>}
                        <div style={{ background: isMe ? T.accent : T.card, color: isMe ? "#fff" : T.text, padding: "10px 14px", borderRadius: isMe ? "16px 16px 4px 16px" : "16px 16px 16px 4px", fontSize: 14, lineHeight: 1.7, boxShadow: isMe ? "none" : T.shadow, border: isMe ? "none" : `1px solid ${T.border}`, wordBreak: "break-word" }}>
                          {msg.content}
                        </div>
                        <div style={{ fontSize: 10, color: T.textMuted, marginTop: 3, textAlign: isMe ? "right" : "left", paddingLeft: isMe ? 0 : 4, paddingRight: isMe ? 4 : 0 }}>
                          {fmtTime(msg.created_at)}
                        </div>
                      </div>
                    </div>
                  </React.Fragment>
                );
              })
            )}
            <div ref={messagesEndRef} />
          </div>

          {/* 메시지 입력 */}
          <div style={{ background: T.card, borderTop: `1px solid ${T.border}`, padding: "10px 14px", paddingBottom: `calc(env(safe-area-inset-bottom,0px) + 10px)`, display: "flex", gap: 8, flexShrink: 0 }}>
            <input value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && handleSend()}
              placeholder="메시지를 입력하세요..."
              style={{ flex: 1, padding: "12px 16px", borderRadius: 22, border: `1px solid ${T.border}`, background: T.bg, fontSize: 15, outline: "none", color: T.text, fontFamily: "inherit" }} />
            <button onClick={handleSend} disabled={!input.trim() || sending}
              style={{ width: 44, height: 44, borderRadius: "50%", border: "none", background: input.trim() ? T.accent : T.border, color: "#fff", cursor: input.trim() ? "pointer" : "default", fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              ↑
            </button>
          </div>

          {/* 나가기 확인 */}
          {showLeaveConfirm && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(74,55,40,0.5)", zIndex: 200, display: "flex", flexDirection: "column", justifyContent: "flex-end" }} onClick={() => setShowLeaveConfirm(false)}>
              <div onClick={e => e.stopPropagation()} style={{ background: T.card, borderRadius: "20px 20px 0 0", padding: "24px 20px", paddingBottom: `calc(env(safe-area-inset-bottom,0px) + 24px)`, textAlign: "center" }}>
                <div style={{ width: 36, height: 4, borderRadius: 2, background: T.border, margin: "0 auto 20px" }} />
                <div style={{ fontSize: 36, marginBottom: 10 }}>👋</div>
                <div style={{ fontSize: 16, fontWeight: 700, color: T.text, marginBottom: 6 }}>이 방을 나가시겠어요?</div>
                <div style={{ fontSize: 14, color: T.textSub, marginBottom: 20, lineHeight: 1.6 }}>나가면 채팅 내역을 볼 수 없어요.<br />다시 입장하면 볼 수 있어요.</div>
                <div style={{ display: "flex", gap: 10 }}>
                  <button onClick={() => setShowLeaveConfirm(false)} style={{ flex: 1, padding: 15, borderRadius: 12, border: `1px solid ${T.border}`, background: T.card, fontSize: 15, fontWeight: 600, color: T.textSub, cursor: "pointer", minHeight: 50 }}>취소</button>
                  <button onClick={handleLeave} style={{ flex: 1, padding: 15, borderRadius: 12, border: "none", background: T.danger, color: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer", minHeight: 50 }}>나가기</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function StatsTab({diaries}) {
      const [subTab, setSubTab] = useState("all");
      const allEmo = {}; diaries.forEach(d=>(d.emotions||[]).forEach(e=>{allEmo[e.key]=(allEmo[e.key]||0)+e.intensity;}));
      const emoSorted = Object.entries(allEmo).sort((a,b)=>b[1]-a[1]); const maxEmo = emoSorted[0]?.[1]||1;
      const allAct = {}; diaries.forEach(d=>(d.activities||[]).forEach(a=>{allAct[a]=(allAct[a]||0)+1;}));
      const actSorted = Object.entries(allAct).sort((a,b)=>b[1]-a[1]); const maxAct = actSorted[0]?.[1]||1;
      if (diaries.length===0) return (<div style={{padding:"80px 20px", textAlign:"center"}}><div style={{fontSize:48, marginBottom:16}}>✨</div><div style={{fontSize:16, fontWeight:700, color:T.text, marginBottom:8}}>아직 기록이 없어요</div><div style={{fontSize:14, color:T.textSub, lineHeight:1.7}}>일기를 쓰기 시작하면<br/>나의 결이 보이기 시작해요.</div></div>);
      return (
        <div style={{padding:"20px 16px", paddingBottom:20}}>
          <div style={{fontSize:20, fontWeight:800, color:T.text, marginBottom:4}}>나의 결</div>
          <div style={{fontSize:13, color:T.textSub, marginBottom:14}}>기록이 쌓일수록 결이 선명해집니다</div>
          <div style={{display:"flex", gap:8, marginBottom:16, overflowX:"auto", paddingBottom:4}}>
            {[["all","전체"],["emotion","감정"],["activity","활동"]].map(([id,label])=>(
              <button key={id} onClick={()=>setSubTab(id)} style={{padding:"9px 18px", borderRadius:20, border:`1.5px solid ${subTab===id?T.accent:T.border}`, background:subTab===id?T.accentBg:T.card, color:subTab===id?T.accent:T.textSub, fontSize:13, fontWeight:subTab===id?700:500, cursor:"pointer", whiteSpace:"nowrap", minHeight:40, flexShrink:0}}>{label}</button>
            ))}
          </div>
          {(subTab==="all"||subTab==="emotion") && emoSorted.length>0 && (
            <div style={{background:T.card, borderRadius:16, padding:20, marginBottom:12, boxShadow:T.shadow}}>
              <div style={{fontSize:14, fontWeight:700, color:T.text, marginBottom:14}}>🎭 감정의 결</div>
              <div style={{display:"flex", flexWrap:"wrap", gap:8, marginBottom:subTab==="emotion"?16:0}}>
                {emoSorted.map(([k,v])=>{const e=EMOTIONS[k]; if(!e) return null; return (<div key={k} style={{padding:"10px 14px", borderRadius:12, background:e.color+"22", textAlign:"center", border:`1px solid ${e.color}44`}}><div style={{fontSize:20}}>{e.emoji}</div><div style={{fontSize:11, fontWeight:600, color:T.text, marginTop:3}}>{e.label}</div><div style={{fontSize:10, color:T.textSub}}>{v}점</div></div>);})}
              </div>
              {subTab==="emotion" && emoSorted.map(([k,v],i)=>{const e=EMOTIONS[k]; if(!e) return null; return (<div key={k} style={{display:"flex", alignItems:"center", gap:10, marginBottom:10}}><span style={{fontSize:12, fontWeight:700, color:T.textSub, minWidth:18}}>{i+1}</span><span style={{fontSize:16}}>{e.emoji}</span><span style={{fontSize:13, fontWeight:600, color:T.text, minWidth:50}}>{e.label}</span><div style={{flex:1, height:8, borderRadius:4, background:T.border}}><div style={{height:"100%", borderRadius:4, background:e.color, width:`${(v/maxEmo)*100}%`}}/></div><span style={{fontSize:12, color:T.textSub, minWidth:28, textAlign:"right"}}>{v}점</span></div>);})}
            </div>
          )}
          {(subTab==="all"||subTab==="activity") && actSorted.length>0 && (
            <div style={{background:T.card, borderRadius:16, padding:20, boxShadow:T.shadow}}>
              <div style={{fontSize:14, fontWeight:700, color:T.text, marginBottom:12}}>🏃 활동의 결</div>
              <div style={{display:"flex", flexWrap:"wrap", gap:8, marginBottom:subTab==="activity"?16:0}}>
                {actSorted.map(([a,c])=>(<div key={a} style={{padding:"9px 14px", borderRadius:14, background:T.accentBg, display:"flex", alignItems:"center", gap:6, border:`1px solid ${T.accentLight}`}}><span style={{fontSize:13, fontWeight:600, color:T.text}}>{a}</span><span style={{fontSize:12, fontWeight:700, color:T.accent, background:T.card, padding:"1px 7px", borderRadius:8}}>{c}회</span></div>))}
              </div>
              {subTab==="activity" && actSorted.map(([a,c],i)=>(<div key={a} style={{display:"flex", alignItems:"center", gap:10, marginBottom:10}}><span style={{fontSize:12, fontWeight:700, color:T.textSub, minWidth:18}}>{i+1}</span><span style={{fontSize:13, fontWeight:600, color:T.text, flex:1}}>{a}</span><div style={{width:100, height:8, borderRadius:4, background:T.border}}><div style={{height:"100%", borderRadius:4, background:T.accent, width:`${(c/maxAct)*100}%`}}/></div><span style={{fontSize:12, color:T.textSub, minWidth:28, textAlign:"right"}}>{c}회</span></div>))}
            </div>
          )}
        </div>
      );
    }

          <div style={{background:T.card, borderRadius:16, padding:24, marginBottom:12, boxShadow:T.shadow}}>
            <div style={{display:"flex", alignItems:"center", gap:14, marginBottom:20}}>
              <div style={{width:56, height:56, borderRadius:"50%", background:T.accentBg, display:"flex", alignItems:"center", justifyContent:"center", fontSize:24, fontWeight:700, color:T.accent, flexShrink:0}}>{user?.name?.[0]||"?"}</div>
              <div><div style={{fontSize:17, fontWeight:700, color:T.text}}>{user?.name}</div><div style={{fontSize:13, color:T.textSub}}>{user?.email}</div></div>
            </div>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10}}>
              <div style={{textAlign:"center", padding:14, background:T.bg, borderRadius:12}}><div style={{fontSize:20, fontWeight:800, color:T.accent}}>{diaries.length}</div><div style={{fontSize:11, color:T.textSub, marginTop:2}}>기록한 하루</div></div>
              <div style={{textAlign:"center", padding:14, background:T.bg, borderRadius:12}}><div style={{fontSize:20, fontWeight:800, color:T.accent}}>{streak}</div><div style={{fontSize:11, color:T.textSub, marginTop:2}}>연속 기록</div></div>
              <div style={{textAlign:"center", padding:14, background:T.bg, borderRadius:12}}><div style={{fontSize:20, fontWeight:800, color:T.accent}}>{photoCount}</div><div style={{fontSize:11, color:T.textSub, marginTop:2}}>사진 기록</div></div>
            </div>
          </div>

          <div style={{background:T.card, borderRadius:16, padding:"16px 20px", marginBottom:12, boxShadow:T.shadow}}>

              <span style={{fontSize:14, color:T.text}}>이용약관</span>
              <span style={{fontSize:13, color:T.textSub}}>→</span>
            </button>
            <button onClick={()=>setShowLegal("privacy")} style={{width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 0", border:"none", background:"none", cursor:"pointer"}}>
              <span style={{fontSize:14, color:T.text}}>개인정보처리방침</span>
              <span style={{fontSize:13, color:T.textSub}}>→</span>
            </button>
          </div>

          <button onClick={handleLogout} disabled={loggingOut} style={{width:"100%", padding:15, borderRadius:12, border:`1px solid ${T.danger}`, background:"transparent", color:T.danger, fontSize:15, fontWeight:600, cursor:"pointer", minHeight:52, opacity:loggingOut?0.7:1}}>{loggingOut?"로그아웃 중...":"로그아웃"}</button>

          <div style={{textAlign:"center", marginTop:20, fontSize:11, color:T.textSub, lineHeight:1.8}}>
            <div>문의: diary.gyeol@gmail.com</div>
            <div>© 2026 GYEOL. All rights reserved.</div>
          </div>
        </div>
      );
    }

    function MainApp() {
      const {user} = useAuth();
      const [diaries, setDiaries] = useState([]);
      const [dbLoading, setDbLoading] = useState(true);
      const [mainTab, setMainTab] = useState(() => {
        const hash = window.location.hash.slice(1);
        return ["diary","community","stats","mypage"].includes(hash) ? hash : "diary";
      });
      const [selected, setSelected] = useState(null);
      const [writing, setWriting] = useState(false);
      const [showAI, setShowAI] = useState(false);
      const [showFilter, setShowFilter] = useState(false);
      const [sd, setSd] = useState(""); const [ed, setEd] = useState("");
      const [savedToast, setSavedToast] = useState(false);
      const [showEditConfirm, setShowEditConfirm] = useState(false);
      const [aiDiary, setAiDiary] = useState(null);
      const [showFloatingBtn, setShowFloatingBtn] = useState(false);
      const [searchQuery, setSearchQuery] = useState("");
      const [showSearch, setShowSearch] = useState(false);
      const recordBtnRef = useRef(null);
      const scrollRef = useRef(null);

      // 스크롤 시 기록 버튼이 화면 밖이면 플로팅 버튼 표시
      useEffect(() => {
        const el = scrollRef.current;
        if (!el) return;
        const onScroll = () => {
          if (recordBtnRef.current) {
            const rect = recordBtnRef.current.getBoundingClientRect();
            setShowFloatingBtn(rect.bottom < 0);
          }
        };
        el.addEventListener("scroll", onScroll, {passive:true});
        return () => el.removeEventListener("scroll", onScroll);
      }, [mainTab]);

      // URL 해시 기반 탭 라우팅 (새로고침 시 현재 탭 유지)
      useEffect(() => { window.location.hash = mainTab; }, [mainTab]);
      useEffect(() => {
        const onHashChange = () => {
          const hash = window.location.hash.slice(1);
          if (["diary","community","stats","mypage"].includes(hash)) setMainTab(hash);
        };
        window.addEventListener("hashchange", onHashChange);
        return () => window.removeEventListener("hashchange", onHashChange);
      }, []);

      // AI 분석 결과 저장 후 로컬 state 업데이트 (재로드 없이)
      const handleAnalysisSaved = useCallback((diaryId, text) => {
        setDiaries(prev => prev.map(d => d.id === diaryId ? { ...d, ai_analysis: text } : d));
      }, []);

      const loadDiaries = useCallback(async () => {
        setDbLoading(true);
        const { data, error } = await sb.from('diary_entries').select('*').eq('user_id', user.id).order('date', { ascending: false });
        if (data) setDiaries(data);
        if (error) console.error('일기 로드 오류:', error);
        setDbLoading(false);
      }, [user]);

      useEffect(() => { if (user) loadDiaries(); }, [user]);

      const todayWritten = diaries.some(d=>d.date===today());
      const hasDraft = (() => { try { return !!localStorage.getItem(`gyeol_draft_${today()}`); } catch(e) { return false; } })();
      const streak = (() => {
        let s=0; const d=new Date(); const start=todayWritten?0:1;
        for(let i=start;i<365;i++){const ds=new Date(d); ds.setDate(ds.getDate()-i); const key=ds.toISOString().slice(0,10); if(diaries.some(x=>x.date===key)) s++; else break;}
        return s;
      })();
      const filtered = diaries.filter(d=>{
        if(sd&&d.date<sd) return false; if(ed&&d.date>ed) return false;
        if(searchQuery.trim()) {
          const q = searchQuery.trim().toLowerCase();
          const words = q.split(/\s+/);
          const haystack = [
            d.title, d.content,
            ...(d.emotions||[]).map(e=>EMOTIONS[e.key]?.label||""),
            ...(d.activities||[]),
            ...(d.places||[]).map(p=>p.name),
            ...(d.people||[]),
            ...(d.purchases||[]),
          ].join(" ").toLowerCase();
          if (!words.every(w => haystack.includes(w))) return false;
        }
        return true;
      });

      const handleSaveDiary = async (data) => {
        const existing = diaries.find(d=>d.date===today());
        if (existing) {
          const { error } = await sb.from('diary_entries').update(data).eq('id', existing.id);
          if (!error) setDiaries(diaries.map(d=>d.date===today()?{...d,...data}:d));
          else { console.error(error); alert("저장 중 오류가 발생했습니다."); return; }
        } else {
          const { data: newEntry, error } = await sb.from('diary_entries').insert({ ...data, user_id: user.id }).select().single();
          if (newEntry) setDiaries([newEntry, ...diaries]);
          else { console.error(error); alert("저장 중 오류가 발생했습니다."); return; }
        }
        setWriting(false);
        setSavedToast(true); setTimeout(()=>setSavedToast(false), 2200);
      };

      const tabs = [{id:"diary",label:"일기",icon:"📝"},{id:"community",label:"연대",icon:"🔗"},{id:"stats",label:"나의 결",icon:"✨"},{id:"mypage",label:"마이",icon:"👤"}];

      if (writing) return (<DiaryWritePage onSave={handleSaveDiary} onCancel={()=>setWriting(false)} editData={todayWritten?diaries.find(d=>d.date===today()):null}/>);
      if (selected) return <DiaryDetail diary={selected} onBack={()=>setSelected(null)}/>;

      return (
        <div style={{position:"fixed", inset:0, display:"flex", flexDirection:"column", background:T.bg, fontFamily:"'Noto Sans KR',sans-serif"}}>
          <div style={{ background:T.card, borderBottom:`1px solid ${T.border}`, padding:"0 20px", paddingTop:`calc(env(safe-area-inset-top,0px) + 10px)`, paddingBottom:10, display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0 }}>
            <span style={{fontSize:17, fontWeight:800, color:T.accent, letterSpacing:3}}>GYEOL</span>
            <div style={{display:"flex", gap:8, alignItems:"center"}}>
              {mainTab==="diary" && (<>
                <button onClick={()=>setShowSearch(s=>!s)} style={{background:showSearch?T.accentBg:T.bg, border:`1px solid ${showSearch?T.accent:T.border}`, borderRadius:10, padding:"8px 12px", fontSize:13, color:showSearch?T.accent:T.text, cursor:"pointer", minHeight:36}}>🔍 검색</button>
                <button onClick={()=>setShowFilter(true)} style={{background:T.bg, border:`1px solid ${T.border}`, borderRadius:10, padding:"8px 12px", fontSize:13, color:T.text, cursor:"pointer", minHeight:36}}>📅 필터</button>
                <button onClick={()=>setShowAI(true)} style={{background:T.bg, border:`1px solid ${T.border}`, borderRadius:10, padding:"8px 12px", fontSize:13, color:T.text, cursor:"pointer", minHeight:36}}>✨ 결 분석</button>
              </>)}
              {streak>0 && (<div style={{background:T.accent, borderRadius:10, padding:"6px 10px", fontSize:12, color:"#fff", fontWeight:700}}>🔥 {streak}일</div>)}
            </div>
          </div>

          {/* 검색바 */}
          {showSearch && mainTab==="diary" && (
            <div style={{background:T.card, borderBottom:`1px solid ${T.border}`, padding:"8px 16px", flexShrink:0, animation:"fadeIn 0.2s ease"}}>
              <div style={{display:"flex", alignItems:"center", background:T.input, borderRadius:12, border:`1.5px solid ${T.border}`, padding:"0 14px"}}>
                <span style={{fontSize:14, color:T.textSub, marginRight:8}}>🔍</span>
                <input value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}
                  placeholder="제목, 내용, 감정, 활동, 장소, 사람, 구매로 검색..."
                  autoFocus
                  style={{flex:1, border:"none", background:"transparent", outline:"none", fontSize:14, color:T.text, padding:"11px 0", fontFamily:"inherit"}}/>
                {searchQuery && (
                  <button onClick={()=>setSearchQuery("")}
                    style={{background:"none", border:"none", fontSize:14, color:T.textSub, cursor:"pointer", padding:4}}>✕</button>
                )}
              </div>
            </div>
          )}

          <div ref={scrollRef} style={{flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch"}}>
            {mainTab==="diary" && (
              <div style={{padding:"16px 16px 12px"}}>
                {dbLoading ? (<div style={{textAlign:"center", padding:40, color:T.textSub}}><div style={{fontSize:14}}>일기를 불러오는 중...</div></div>) : (<>
                  <WeeklyAISummary diaries={diaries}/>
                  {streak>0 && (<div style={{background:T.gradient, borderRadius:14, padding:"14px 18px", marginBottom:14, display:"flex", alignItems:"center", justifyContent:"space-between", color:"#fff"}}><div><div style={{fontSize:14, fontWeight:700}}>🔥 {streak}일째 나를 들여다보는 중</div><div style={{fontSize:11, opacity:0.85, marginTop:1}}>매일 쌓이는 기록이 결을 만들어요</div></div><div style={{fontSize:28, fontWeight:800}}>{streak}</div></div>)}
                  {hasDraft && (
                    <div onClick={()=>setWriting(true)} style={{background:`linear-gradient(135deg, ${T.card}, ${T.accentBg})`, borderRadius:14, padding:"16px 18px", marginBottom:10, border:`1.5px dashed ${T.accent}`, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"space-between", boxShadow:T.shadow, animation:"fadeIn 0.3s ease"}}>
                      <div><div style={{fontSize:14, fontWeight:700, color:T.accent, marginBottom:3}}>📝 작성중인 일기가 있어요</div><div style={{fontSize:12, color:T.textSub}}>탭하여 이어서 작성하기</div></div>
                      <div style={{fontSize:12, fontWeight:600, color:"#fff", padding:"6px 14px", background:T.accent, borderRadius:10}}>이어쓰기</div>
                    </div>
                  )}
                  <button ref={recordBtnRef} onClick={()=>{if(!hasDraft&&todayWritten) setShowEditConfirm(true); else setWriting(true);}}
                    style={{width:"100%", padding:16, borderRadius:14, border:"none", background:(hasDraft||!todayWritten)?T.gradient:T.border, color:(hasDraft||!todayWritten)?"#fff":T.textSub, fontSize:15, fontWeight:700, cursor:"pointer", marginBottom:16, minHeight:52, boxShadow:(hasDraft||!todayWritten)?`0 4px 16px ${T.accent}44`:"none", display:"flex", alignItems:"center", justifyContent:"center", gap:6}}>
                    <span style={{fontSize:18}}>✏️</span>{hasDraft?"작성중인 일기 이어쓰기":todayWritten?"오늘 일기 수정하기":"오늘 하루 기록하기"}
                  </button>
                  <div style={{display:"flex", flexDirection:"column", gap:10}}>
                    {filtered.length===0 && (<div style={{textAlign:"center", padding:40, color:T.textSub}}><div style={{fontSize:40, marginBottom:10}}>{searchQuery?"🔍":"✏️"}</div><div style={{fontSize:14, lineHeight:1.7}}>{searchQuery?`"${searchQuery}" 검색 결과가 없어요.`:"아직 기록이 없어요.\n오늘의 하루를 솔직하게 적어보세요."}</div></div>)}
                    {filtered.map(d=>{
                      return (
                        <div key={d.id} style={{background:T.card, borderRadius:16, padding:"16px 18px", boxShadow:T.shadow, border:"1px solid transparent"}}>
                          <div onClick={()=>setSelected(d)} style={{cursor:"pointer"}}>
                            <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6}}>
                              <div style={{display:"flex", alignItems:"center", gap:6}}><span style={{fontSize:12, color:T.textSub}}>{fmt(d.date)}</span>{isToday(d.date)&&<span style={{background:T.accent, color:"#fff", padding:"2px 8px", borderRadius:6, fontSize:10, fontWeight:700}}>TODAY</span>}</div>
                              {d.photo_url&&<span style={{fontSize:16, flexShrink:0}}>📷</span>}
                            </div>
                            <div style={{fontSize:15, fontWeight:700, color:T.text, marginBottom:8, lineHeight:1.4}}>{d.title}</div>
                            <div style={{display:"flex", flexWrap:"wrap", gap:5, marginBottom:6}}>
                              {(d.emotions||[]).map(e=>EMOTIONS[e.key]?(<span key={e.key} style={{padding:"4px 10px", borderRadius:12, background:EMOTIONS[e.key].color+"22", fontSize:12, color:T.text, fontWeight:500}}>{EMOTIONS[e.key].emoji} {EMOTIONS[e.key].label}</span>):null)}
                            </div>
                            <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
                              {(d.places||[]).map((p,i)=>(<span key={`p${i}`} style={{fontSize:11, color:T.textSub}}>📍 {p.name}</span>))}
                              {(d.people||[]).map((name,i)=>(<span key={`pe${i}`} style={{fontSize:11, color:T.textSub}}>👤 {name}</span>))}
                              {(d.purchases||[]).map((item,i)=>(<span key={`pu${i}`} style={{fontSize:11, color:T.textSub}}>🛍️ {item}</span>))}
                            </div>
                          </div>
                          <div style={{marginTop:10, paddingTop:10, borderTop:`1px solid ${T.border}`}}>
                            <button onClick={e=>{e.stopPropagation(); setAiDiary(d);}}
                              style={{width:"100%", padding:"8px 0", border:`1px solid ${T.accentLight}`, borderRadius:10, background:T.accentBg, color:T.accent, fontSize:13, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:5, minHeight:36}}>
                              🤖 AI 분석 보기
                            </button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </>)}
              </div>
            )}
            {mainTab==="stats" && <StatsTab diaries={diaries}/>}
            {mainTab==="mypage" && <MyPage diaries={diaries} streak={streak}/>}
            {mainTab==="community" && <CommunityTab diaries={diaries} />}
          </div>

          <div style={{background:T.card, borderTop:`1px solid ${T.border}`, display:"flex", paddingBottom:`env(safe-area-inset-bottom,0px)`, flexShrink:0}}>
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setMainTab(t.id)} style={{flex:1, display:"flex", flexDirection:"column", alignItems:"center", padding:"10px 0", border:"none", background:"none", cursor:"pointer", color:mainTab===t.id?T.accent:T.textSub, minHeight:56}}>
                <span style={{fontSize:22, marginBottom:2}}>{t.icon}</span>
                <span style={{fontSize:10, fontWeight:mainTab===t.id?700:500}}>{t.label}</span>
                {mainTab===t.id&&<div style={{width:4, height:4, borderRadius:"50%", background:T.accent, marginTop:3}}/>}
              </button>
            ))}
          </div>

          {showFilter && (
            <div style={{position:"fixed", inset:0, background:"rgba(74,55,40,0.5)", zIndex:200, display:"flex", flexDirection:"column", justifyContent:"flex-end"}} onClick={()=>setShowFilter(false)}>
              <div onClick={e=>e.stopPropagation()} style={{background:T.card, borderRadius:"20px 20px 0 0", padding:"24px 20px", paddingBottom:`calc(env(safe-area-inset-bottom,0px) + 24px)`}}>
                <div style={{width:36, height:4, borderRadius:2, background:T.border, margin:"0 auto 20px"}}/>
                <div style={{fontSize:16, fontWeight:700, color:T.text, marginBottom:16}}>📅 날짜 필터</div>
                <div style={{marginBottom:12}}><div style={{fontSize:12, color:T.textSub, fontWeight:600, marginBottom:6}}>시작 날짜</div><input type="date" value={sd} onChange={e=>setSd(e.target.value)} style={{width:"100%", padding:"12px 14px", borderRadius:12, border:`1px solid ${T.border}`, fontSize:16, background:T.bg, color:T.text, boxSizing:"border-box", WebkitAppearance:"none"}}/></div>
                <div style={{marginBottom:20}}><div style={{fontSize:12, color:T.textSub, fontWeight:600, marginBottom:6}}>끝 날짜</div><input type="date" value={ed} onChange={e=>setEd(e.target.value)} style={{width:"100%", padding:"12px 14px", borderRadius:12, border:`1px solid ${T.border}`, fontSize:16, background:T.bg, color:T.text, boxSizing:"border-box", WebkitAppearance:"none"}}/></div>
                <div style={{display:"flex", gap:10}}>
                  <button onClick={()=>{setSd("");setEd("");setShowFilter(false);}} style={{flex:1, padding:15, borderRadius:12, border:`1px solid ${T.border}`, background:T.card, fontSize:15, fontWeight:600, color:T.textSub, cursor:"pointer", minHeight:50}}>초기화</button>
                  <button onClick={()=>setShowFilter(false)} style={{flex:1, padding:15, borderRadius:12, border:"none", background:T.accent, color:"#fff", fontSize:15, fontWeight:700, cursor:"pointer", minHeight:50}}>적용</button>
                </div>
              </div>
            </div>
          )}

          {showAI && <AIChatModal onClose={()=>setShowAI(false)} diaries={diaries}/>}
          {aiDiary && <DiaryAIModal diary={aiDiary} onClose={()=>setAiDiary(null)} onAnalysisSaved={handleAnalysisSaved}/>}

          {showEditConfirm && (
            <div style={{position:"fixed", inset:0, background:"rgba(74,55,40,0.5)", zIndex:200, display:"flex", flexDirection:"column", justifyContent:"flex-end"}} onClick={()=>setShowEditConfirm(false)}>
              <div onClick={e=>e.stopPropagation()} style={{background:T.card, borderRadius:"20px 20px 0 0", padding:"24px 20px", paddingBottom:`calc(env(safe-area-inset-bottom,0px) + 24px)`, textAlign:"center"}}>
                <div style={{width:36, height:4, borderRadius:2, background:T.border, margin:"0 auto 20px"}}/>
                <div style={{fontSize:36, marginBottom:10}}>✏️</div>
                <div style={{fontSize:16, fontWeight:700, color:T.text, marginBottom:6}}>오늘 일기를 이미 작성했어요</div>
                <div style={{fontSize:14, color:T.textSub, marginBottom:20, lineHeight:1.6}}>수정하시겠어요?</div>
                <div style={{display:"flex", gap:10}}>
                  <button onClick={()=>setShowEditConfirm(false)} style={{flex:1, padding:15, borderRadius:12, border:`1px solid ${T.border}`, background:T.card, fontSize:15, fontWeight:600, color:T.textSub, cursor:"pointer", minHeight:50}}>취소</button>
                  <button onClick={()=>{setShowEditConfirm(false);setWriting(true);}} style={{flex:1, padding:15, borderRadius:12, border:"none", background:T.accent, color:"#fff", fontSize:15, fontWeight:700, cursor:"pointer", minHeight:50}}>수정하기</button>
                </div>
              </div>
            </div>
          )}

          {/* 플로팅 기록 버튼 */}
          {showFloatingBtn && mainTab==="diary" && (
            <button onClick={()=>{if(!hasDraft&&todayWritten) setShowEditConfirm(true); else setWriting(true);}}
              style={{position:"fixed", top:`calc(env(safe-area-inset-top,0px) + 60px)`, left:"50%", transform:"translateX(-50%)", padding:"12px 28px", borderRadius:30, border:"none", background:(hasDraft||!todayWritten)?T.accent:"rgba(232,223,208,0.95)", color:(hasDraft||!todayWritten)?"#fff":T.textSub, fontSize:14, fontWeight:700, cursor:"pointer", zIndex:90, boxShadow:"0 4px 20px rgba(0,0,0,0.15)", display:"flex", alignItems:"center", gap:6, animation:"slideUp 0.25s ease", backdropFilter:"blur(10px)", WebkitBackdropFilter:"blur(10px)"}}>
              <span style={{fontSize:16}}>✏️</span>{hasDraft?"작성중인 일기 이어쓰기":todayWritten?"오늘 일기 수정하기":"오늘 하루 기록하기"}
            </button>
          )}

          {savedToast && (
            <div style={{position:"fixed", bottom:`calc(env(safe-area-inset-bottom,0px) + 72px)`, left:"50%", transform:"translateX(-50%)", background:T.accent, color:"#fff", padding:"13px 28px", borderRadius:14, fontSize:14, fontWeight:600, boxShadow:`0 8px 32px ${T.accent}66`, zIndex:2000, whiteSpace:"nowrap", animation:"slideUp 0.3s ease"}}>
              ✨ 오늘의 결이 저장되었어요
            </div>
          )}
        </div>
      );
    }

    function AuthRouter() {
      const {user, loading} = useAuth();
      if (loading) return <LoadingScreen text="나의 결을 발견하는 중..."/>;
      return user ? <MainApp/> : <LoginPage/>;
    }
    function App() { return <AuthProvider><AuthRouter/></AuthProvider>; }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
